<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>文字迷路の赤ずきん 10x10</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #2b241f;
      --muted: #6d6258;
      --cream: #fff7e8;
      --paper: rgba(255, 249, 237, .92);
      --wall: #3b312b;
      --tile: #fff0d3;
      --seen: #ffd3c8;
      --now: #ef9b96;
      --red: #d83d48;
      --green: #3d7d58;
      --blue: #86c7e8;
      --gold: #f1b83f;
      font-family: "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", Meiryo, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: linear-gradient(180deg, #bfe9ff 0 44%, #a9d78e 44% 100%);
      overflow-x: hidden;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(520px, 1.04fr) minmax(360px, .96fr);
      grid-template-rows: minmax(0, 1fr);
    }

    .stage-shell {
      position: relative;
      grid-column: 2;
      overflow: hidden;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 14%, rgba(255, 217, 92, .88) 0 38px, transparent 39px),
        linear-gradient(180deg, rgba(255,255,255,.24), rgba(255,255,255,0) 38%);
    }

    .topbar {
      position: absolute;
      z-index: 5;
      inset: 16px 18px auto;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 3.2vw, 2.35rem);
      line-height: 1.08;
      letter-spacing: 0;
      text-shadow: 0 2px 0 rgba(255,255,255,.62);
    }

    .badge {
      min-width: 98px;
      padding: 8px 12px;
      border: 2px solid rgba(59,49,43,.2);
      border-radius: 8px;
      background: rgba(255, 250, 239, .88);
      text-align: center;
      font-weight: 900;
      white-space: nowrap;
    }

    .stage-caption {
      position: absolute;
      z-index: 5;
      left: 50%;
      bottom: 12px;
      width: min(680px, calc(100% - 24px));
      transform: translateX(-50%);
      display: grid;
      gap: 4px;
      padding: 10px 12px;
      border: 2px solid rgba(59,49,43,.16);
      border-radius: 8px;
      background: rgba(255, 250, 239, .82);
      backdrop-filter: blur(8px);
    }

    .stage-title {
      font-size: clamp(1.05rem, 2.2vw, 1.55rem);
      font-weight: 900;
    }

    .stage-text {
      color: var(--muted);
      font-size: clamp(.88rem, 1.8vw, 1rem);
      line-height: 1.45;
    }

    .image-stage {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: linear-gradient(180deg, #bfe9ff 0 48%, #a1d784 48% 100%);
    }

    .sky-dot {
      position: absolute;
      left: 8%;
      top: 8%;
      width: 74px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: #ffd95f;
      box-shadow: 0 0 40px rgba(255, 217, 95, .42);
    }

    .cloud-strip,
    .far-forest,
    .ground-strip,
    .grass-strip {
      position: absolute;
      left: 0;
      width: 200%;
      display: flex;
      will-change: transform;
    }

    .cloud-strip {
      top: 12%;
      height: 86px;
      animation: scrollLayer 34s linear infinite;
    }

    .far-forest {
      bottom: 28%;
      height: 170px;
      animation: scrollLayer 18s linear infinite;
    }

    .ground-strip {
      bottom: 0;
      height: 34%;
      animation: scrollLayer 8s linear infinite;
    }

    .grass-strip {
      bottom: 3%;
      height: 64px;
      animation: scrollLayer 3.6s linear infinite;
    }

    .cloud-panel,
    .forest-panel,
    .ground-panel,
    .grass-panel {
      position: relative;
      flex: 0 0 50%;
      height: 100%;
    }

    .cloud {
      position: absolute;
      width: 140px;
      height: 44px;
      border-radius: 999px;
      background: rgba(255,255,255,.92);
      box-shadow:
        34px -14px 0 4px rgba(255,255,255,.92),
        76px -2px 0 8px rgba(255,255,255,.92);
    }

    .cloud.one { left: 8%; top: 26px; }
    .cloud.two { left: 48%; top: 8px; transform: scale(.82); }
    .cloud.three { left: 78%; top: 34px; transform: scale(1.05); }

    .forest-panel::before,
    .forest-panel::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 100%;
      background-repeat: repeat-x;
      background-size: 180px 170px;
    }

    .forest-panel::before {
      opacity: .75;
      background-image:
        linear-gradient(135deg, transparent 0 43%, #377a55 43% 57%, transparent 57%),
        linear-gradient(45deg, transparent 0 43%, #2f6d4d 43% 57%, transparent 57%),
        linear-gradient(90deg, transparent 0 48%, #765239 48% 52%, transparent 52%);
      background-position: 0 0, 0 0, 0 58px;
    }

    .forest-panel::after {
      opacity: .92;
      background-size: 136px 142px;
      background-image:
        linear-gradient(135deg, transparent 0 43%, #2f704f 43% 57%, transparent 57%),
        linear-gradient(45deg, transparent 0 43%, #286446 43% 57%, transparent 57%),
        linear-gradient(90deg, transparent 0 47%, #6e4c34 47% 53%, transparent 53%);
      background-position: 44px 28px, 44px 28px, 44px 72px;
    }

    .ground-panel {
      background:
        radial-gradient(circle at 18% 28%, rgba(255,255,255,.2) 0 12px, transparent 13px),
        radial-gradient(circle at 62% 42%, rgba(255,255,255,.16) 0 10px, transparent 11px),
        linear-gradient(180deg, #9bd37d, #72b65f);
    }

    .grass-panel {
      background-repeat: repeat-x;
      background-size: 92px 64px;
      background-image:
        linear-gradient(70deg, transparent 0 44%, #3e8b55 44% 50%, transparent 50%),
        linear-gradient(110deg, transparent 0 48%, #4a9a5e 48% 54%, transparent 54%),
        linear-gradient(86deg, transparent 0 50%, #327d4b 50% 56%, transparent 56%);
    }

    .walk-hero {
      position: absolute;
      z-index: 3;
      left: 50%;
      bottom: 13%;
      width: clamp(142px, 20vw, 236px);
      height: clamp(213px, 30vw, 354px);
      object-fit: contain;
      object-position: center bottom;
      transform: translateX(-50%);
      transform-origin: 50% 92%;
      animation: heroPendulum .34s ease-in-out infinite alternate;
      filter: drop-shadow(0 12px 8px rgba(43,36,31,.22));
      user-select: none;
      pointer-events: none;
    }

    .scene-object {
      position: absolute;
      z-index: 2;
      left: 67%;
      bottom: 16%;
      width: clamp(88px, 13vw, 150px);
      height: clamp(88px, 13vw, 150px);
      transform: translateX(-50%);
      animation: objectPop 1.4s ease-in-out infinite;
    }

    .scene-object.flower {
      background:
        radial-gradient(circle at 50% 30%, #ffd95f 0 10%, transparent 11%),
        radial-gradient(circle at 34% 30%, #e6577a 0 13%, transparent 14%),
        radial-gradient(circle at 66% 30%, #e6577a 0 13%, transparent 14%),
        radial-gradient(circle at 50% 12%, #e6577a 0 13%, transparent 14%),
        radial-gradient(circle at 50% 48%, #e6577a 0 13%, transparent 14%),
        linear-gradient(90deg, transparent 0 47%, #34734f 47% 53%, transparent 53%);
    }

    .scene-object.cat {
      border-radius: 50% 50% 44% 44%;
      background:
        radial-gradient(circle at 38% 38%, #222 0 3%, transparent 4%),
        radial-gradient(circle at 62% 38%, #222 0 3%, transparent 4%),
        radial-gradient(circle at 50% 50%, #7b4c2d 0 4%, transparent 5%),
        linear-gradient(135deg, #f0b15b 0 28%, transparent 29%),
        linear-gradient(225deg, #f0b15b 0 28%, transparent 29%),
        #f0b15b;
    }

    .scene-object.house {
      width: clamp(136px, 19vw, 230px);
      height: clamp(124px, 17vw, 210px);
      background:
        linear-gradient(135deg, transparent 0 34%, #c6533e 35% 50%, transparent 51%),
        linear-gradient(45deg, transparent 0 34%, #c6533e 35% 50%, transparent 51%),
        linear-gradient(90deg, transparent 0 41%, #8b6540 41% 58%, transparent 58%),
        linear-gradient(#ffe1a6, #f5c985);
      border: 4px solid rgba(139,101,64,.75);
      border-radius: 8px;
      animation-duration: 2.2s;
    }

    .scene-object.note {
      color: #634fa3;
      font-size: clamp(4rem, 9vw, 8rem);
      font-weight: 900;
      display: grid;
      place-items: center;
    }

    .scene-object.letter {
      width: clamp(100px, 15vw, 170px);
      height: clamp(64px, 9vw, 104px);
      border: 4px solid #8b6540;
      border-radius: 8px;
      background:
        linear-gradient(34deg, transparent 0 47%, #8b6540 48% 51%, transparent 52%),
        linear-gradient(146deg, transparent 0 47%, #8b6540 48% 51%, transparent 52%),
        #fff7df;
      animation-name: letterFloat;
    }

    .scene-word {
      position: absolute;
      z-index: 4;
      left: 55%;
      top: 23%;
      padding: 6px 10px;
      border: 2px solid rgba(59,49,43,.16);
      border-radius: 8px;
      background: rgba(255,250,239,.84);
      font-size: clamp(1.2rem, 3vw, 2.4rem);
      font-weight: 900;
      animation: wordFloat 1.8s ease-in-out infinite;
    }

    .stage-shell.paused .cloud-strip,
    .stage-shell.paused .far-forest,
    .stage-shell.paused .ground-strip,
    .stage-shell.paused .grass-strip {
      animation-play-state: paused;
    }

    .stage-shell.walking .cloud-strip,
    .stage-shell.walking .far-forest,
    .stage-shell.walking .ground-strip,
    .stage-shell.walking .grass-strip {
      animation-play-state: running;
    }

    .cloud { animation: none; }
    .wrong-mode .stage-shell { background: linear-gradient(180deg, #c7d0ff 0 44%, #acd590 44% 100%); }
    .wrong-mode .image-stage { background: linear-gradient(180deg, #c7d0ff 0 48%, #acd590 48% 100%); }

    .play {
      position: relative;
      z-index: 6;
      grid-column: 1;
      grid-row: 1;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      width: 100%;
      min-height: 100vh;
      margin: 0;
      background: var(--paper);
      border-right: 4px solid rgba(59,49,43,.18);
      box-shadow: 18px 0 52px rgba(37, 76, 54, .14);
    }

    .maze-pad {
      display: grid;
      place-items: center;
      min-height: 0;
      padding: 14px;
      overflow-x: auto;
    }

    .maze {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      grid-template-rows: repeat(10, minmax(0, 1fr));
      width: min(100%, calc(100vh - 166px));
      min-width: 0;
      background: var(--wall);
      border: 4px solid var(--wall);
      border-radius: 8px;
      overflow: hidden;
    }

    .cell {
      position: relative;
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 0;
      aspect-ratio: 1;
      border: 2px solid var(--wall);
      background: var(--tile);
      font-weight: 900;
      font-size: clamp(1.05rem, 3.2vw, 1.55rem);
      line-height: 1;
      user-select: none;
      overflow: hidden;
    }

    .cell::before {
      content: "";
      position: absolute;
      inset: 13%;
      border-radius: 6px;
      background: rgba(255,255,255,.36);
      transform: rotate(-5deg);
    }

    .cell span {
      position: relative;
      z-index: 1;
    }

    .cell.visited { background: var(--seen); }
    .cell.current {
      background: var(--now);
      animation: cellPop .24s ease-out;
    }

    .cell.current::after {
      content: "";
      position: absolute;
      z-index: 2;
      left: 50%;
      bottom: 8%;
      width: 42%;
      height: 48%;
      border-radius: 50% 50% 42% 42%;
      background:
        radial-gradient(circle at 50% 34%, #ffd7b1 0 18%, transparent 19%),
        radial-gradient(circle at 39% 33%, #2b241f 0 3%, transparent 3.5%),
        radial-gradient(circle at 61% 33%, #2b241f 0 3%, transparent 3.5%),
        linear-gradient(180deg, #d83d48 0 52%, #ea5961 53% 100%);
      border: 2px solid #9e2630;
      box-shadow: 0 2px 0 rgba(59,49,43,.2), 0 0 0 4px rgba(216, 61, 72, .12);
      transform: translateX(-50%);
      animation: miniWalk .72s ease-in-out infinite;
    }

    .cell.current span {
      z-index: 3;
      transform: translateY(-32%);
      padding: 1px 4px;
      border-radius: 6px;
      background: rgba(255, 250, 239, .74);
      text-shadow: 0 1px 0 #fff;
    }

    .cell.goal { background: #ffe28b; }
    .cell.bad { background: #d6ebff; }

    .sentence-panel {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 10px 12px 12px;
      border-top: 2px solid rgba(59,49,43,.08);
    }

    .label {
      color: var(--muted);
      font-size: .82rem;
      font-weight: 900;
    }

    .sentence {
      min-height: 2.8em;
      font-size: clamp(1rem, 2.35vw, 1.45rem);
      font-weight: 900;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, 46px);
      grid-template-rows: repeat(2, 42px);
      gap: 8px;
      justify-content: end;
      margin-top: 8px;
    }

    button {
      border: 2px solid rgba(59,49,43,.22);
      border-radius: 8px;
      background: #fffdf7;
      color: var(--ink);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 3px 0 rgba(59,49,43,.18);
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 rgba(59,49,43,.18);
    }

    .restart {
      width: 100%;
      padding: 7px 12px;
    }

    .up { grid-column: 2; }
    .left { grid-column: 1; grid-row: 2; }
    .down { grid-column: 2; grid-row: 2; }
    .right { grid-column: 3; grid-row: 2; }

    @keyframes cellPop {
      0% { transform: scale(.92); }
      70% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    @keyframes miniWalk {
      0%, 100% { transform: translateX(-50%) translateY(0) rotate(-2deg); }
      50% { transform: translateX(-50%) translateY(-5%) rotate(2deg); }
    }

    @keyframes scrollLayer {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    @keyframes objectPop {
      0%, 100% { transform: translateX(-50%) translateY(0) rotate(-2deg); }
      50% { transform: translateX(-50%) translateY(-16px) rotate(3deg); }
    }

    @keyframes letterFloat {
      0%, 100% { transform: translateX(-50%) translate(0, 0) rotate(-7deg); }
      50% { transform: translateX(-50%) translate(42px, -34px) rotate(6deg); }
    }

    @keyframes wordFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes heroPendulum {
      0% { transform: translateX(-50%) translateY(0) rotate(-1.8deg); }
      100% { transform: translateX(-50%) translateY(-4px) rotate(1.8deg); }
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(330px, 44vh) auto;
      }

      .stage-shell {
        grid-column: 1;
        min-height: 0;
      }

      .play {
        grid-column: 1;
        grid-row: 2;
        min-height: 0;
        border-right: 0;
        border-top: 4px solid rgba(59,49,43,.2);
        box-shadow: 0 -18px 52px rgba(37, 76, 54, .16);
      }

      .maze {
        width: 100%;
        min-width: 540px;
      }
    }

    @media (max-width: 740px) {
      .app { grid-template-rows: minmax(330px, 44vh) auto; }
      .topbar { inset: 10px 12px auto; }
      .badge { min-width: 82px; padding: 7px 9px; font-size: .9rem; }
      .stage-caption { bottom: 8px; }
      .sentence-panel { grid-template-columns: 1fr; }
      .controls { justify-content: center; }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <section class="stage-shell" aria-label="物語アニメーション">
      <div class="topbar">
        <h1>文字迷路の赤ずきん</h1>
        <div class="badge" id="badge">STAGE 1</div>
      </div>
      <div id="stage" class="image-stage" role="img" aria-label="赤ずきんのアニメーション"></div>
      <div class="stage-caption">
        <div class="stage-title" id="stageTitle">森の入口</div>
        <div class="stage-text" id="stageText">矢印キーかボタンで進み、ひらがなをつなげて一文を完成させます。</div>
      </div>
    </section>

    <section class="play" aria-label="文字迷路">
      <div class="maze-pad">
        <div class="maze" id="maze" aria-live="polite"></div>
      </div>
      <div class="sentence-panel">
        <div>
          <div class="label">できかけの一文</div>
          <div class="sentence" id="sentence"></div>
        </div>
        <div>
          <button class="restart" id="restart">はじめから</button>
          <div class="controls" aria-label="移動">
            <button class="up" data-move="0,-1" aria-label="上へ">↑</button>
            <button class="left" data-move="-1,0" aria-label="左へ">←</button>
            <button class="down" data-move="0,1" aria-label="下へ">↓</button>
            <button class="right" data-move="1,0" aria-label="右へ">→</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const cols = 10;
    const rows = 10;
    const start = key(0, 5);

    const trunk = Array.from({ length: 10 }, (_, x) => key(x, 5));
    const routeA = [[1,4],[0,4],[0,3],[1,3],[1,2],[0,2],[0,1],[1,1],[1,0],[0,0]].map(toKey);
    const routeB = [[2,4],[3,4],[4,4],[4,3],[3,3],[2,3],[2,2],[3,2],[4,2],[4,1],[4,0],[3,0],[2,0],[2,1],[3,1]].map(toKey);
    const routeC = [[5,4],[6,4],[6,3],[5,3],[5,2],[6,2],[6,1],[5,1],[5,0],[6,0]].map(toKey);
    const routeD = [[9,4],[8,4],[7,4],[7,3],[8,3],[9,3],[9,2],[8,2],[7,2],[7,1],[7,0],[8,0],[9,0],[9,1],[8,1]].map(toKey);
    const routeE = [[0,6],[1,6],[2,6],[2,7],[1,7],[0,7],[0,8],[0,9],[1,9],[2,9],[2,8],[1,8]].map(toKey);
    const routeF = [[3,6],[4,6],[4,7],[3,7],[3,8],[4,8],[4,9],[3,9]].map(toKey);
    const routeG = [[7,6],[6,6],[5,6],[5,7],[6,7],[7,7],[7,8],[7,9],[6,9],[5,9],[5,8],[6,8]].map(toKey);
    const routeH = [[9,6],[8,6],[8,7],[9,7],[9,8],[8,8],[8,9],[9,9]].map(toKey);

    const labels = new Map();
    writeText(trunk, "あかずきんはきょうも");
    writeText([...trunk.slice(0, 2), ...routeA], "あかいはながみちでさいた");
    writeText([...trunk.slice(0, 3), ...routeB], "あかずきんはひろばでこねことあそんだ");
    writeText([...trunk.slice(0, 6), ...routeC], "あかずきんはこいしをならべてみた");
    writeText([...trunk, ...routeD], "あかずきんはきょうもみずうみでつきのうたをきいたよ");
    writeText([trunk[0], ...routeE], "あまいぱいをみんなでたべた");
    writeText([...trunk.slice(0, 4), ...routeF], "あかずきんがうたをうたう");
    writeText([...trunk.slice(0, 8), ...routeG], "あかずきんはきょうはとりにてがみをわたす");
    writeText([...trunk, ...routeH], "あかずきんはきょうもおばあさんへいく");

    const graph = new Map();
    for (let y = 0; y < rows; y += 1) {
      for (let x = 0; x < cols; x += 1) graph.set(key(x, y), new Set());
    }
    connect(trunk);
    connect([key(1, 5), ...routeA]);
    connect([key(2, 5), ...routeB]);
    connect([key(5, 5), ...routeC]);
    connect([key(9, 5), ...routeD]);
    connect([key(0, 5), ...routeE]);
    connect([key(3, 5), ...routeF]);
    connect([key(7, 5), ...routeG]);
    connect([key(9, 5), ...routeH]);

    const endings = new Map([
      [last(routeA), { type: "flower", good: false, title: "あかい花の道", text: "赤い花が道に咲き、赤ずきんは見とれて足を止めました。" }],
      [last(routeB), { type: "cat", good: false, title: "こねこと広場", text: "広場のこねこが毛糸を転がし、赤ずきんはつい遊んでしまいました。" }],
      [last(routeC), { type: "stone", good: false, title: "こいしのならべっこ", text: "赤ずきんは小石を星の形に並べて、すっかり道草をしました。" }],
      [last(routeD), { type: "lake", good: false, title: "湖と月の歌", text: "湖に映る月が歌いだし、赤ずきんは夜まで聞き入ってしまいました。" }],
      [last(routeE), { type: "pie", good: false, title: "甘いパイの会", text: "甘いパイの香りに誘われ、森のみんなでおやつ会が始まりました。" }],
      [last(routeF), { type: "song", good: false, title: "歌う赤ずきん", text: "赤ずきんは小さな舞台で歌い、森の木々が手拍子しました。" }],
      [last(routeG), { type: "bird", good: false, title: "鳥への手紙", text: "赤ずきんは鳥に手紙を渡し、空の郵便屋さんを見送りました。" }],
      [last(routeH), { type: "home", good: true, title: "おばあさんの家へ", text: "赤ずきんは今日もおばあさんの家へ、まっすぐ歩いていきました。" }]
    ]);

    const app = document.querySelector("#app");
    const stageShell = document.querySelector(".stage-shell");
    const stage = document.querySelector("#stage");
    const maze = document.querySelector("#maze");
    const sentence = document.querySelector("#sentence");
    const badge = document.querySelector("#badge");
    const stageTitle = document.querySelector("#stageTitle");
    const stageText = document.querySelector("#stageText");
    const cells = new Map();
    const walkFrames = ["assets/red-walk/sticker/red-riding-hood-walk-sticker.png"];
    let current = start;
    let path = [start];
    let locked = false;
    let walkFrame = 0;

    validateMaze();
    buildMaze();
    renderScene("ready");
    renderMaze();

    document.querySelectorAll("[data-move]").forEach((button) => {
      button.addEventListener("click", () => {
        const [dx, dy] = button.dataset.move.split(",").map(Number);
        move(dx, dy);
      });
    });
    document.querySelector("#restart").addEventListener("click", reset);
    window.addEventListener("keydown", (event) => {
      const moves = {
        ArrowUp: [0, -1], w: [0, -1],
        ArrowDown: [0, 1], s: [0, 1],
        ArrowLeft: [-1, 0], a: [-1, 0],
        ArrowRight: [1, 0], d: [1, 0]
      };
      if (!moves[event.key]) return;
      event.preventDefault();
      move(...moves[event.key]);
    });

    function buildMaze() {
      maze.innerHTML = "";
      for (let y = 0; y < rows; y += 1) {
        for (let x = 0; x < cols; x += 1) {
          const id = key(x, y);
          const cell = document.createElement("div");
          cell.className = "cell";
          cell.innerHTML = `<span>${labels.get(id)}</span>`;
          setWalls(cell, x, y);
          if (endings.has(id)) cell.classList.add(endings.get(id).good ? "goal" : "bad");
          maze.append(cell);
          cells.set(id, cell);
        }
      }
    }

    function setWalls(cell, x, y) {
      const open = graph.get(key(x, y));
      cell.style.borderTopWidth = open.has(key(x, y - 1)) ? "0" : "2px";
      cell.style.borderRightWidth = open.has(key(x + 1, y)) ? "0" : "2px";
      cell.style.borderBottomWidth = open.has(key(x, y + 1)) ? "0" : "2px";
      cell.style.borderLeftWidth = open.has(key(x - 1, y)) ? "0" : "2px";
    }

    function move(dx, dy) {
      if (locked) return;
      const [x, y] = current.split(",").map(Number);
      const next = key(x + dx, y + dy);
      if (!graph.get(current).has(next)) {
        cells.get(current).animate([
          { transform: "translateX(0)" },
          { transform: "translateX(-5px)" },
          { transform: "translateX(5px)" },
          { transform: "translateX(0)" }
        ], { duration: 170, easing: "ease-out" });
        return;
      }
      current = next;
      const old = path.indexOf(next);
      path = old >= 0 ? path.slice(0, old + 1) : [...path, next];
      renderMaze();
      if (endings.has(current)) finish(endings.get(current));
    }

    function renderMaze() {
      for (const [id, cell] of cells) {
        cell.classList.toggle("visited", path.includes(id));
        cell.classList.toggle("current", id === current);
      }
      sentence.textContent = path.map((id) => labels.get(id)).join("");
    }

    function finish(ending) {
      locked = true;
      app.classList.toggle("wrong-mode", !ending.good);
      badge.textContent = ending.good ? "CLEAR" : "やりなおし";
      stageTitle.textContent = ending.title;
      stageText.textContent = ending.text;
      renderScene(ending.type);
      if (!ending.good) window.setTimeout(reset, 5200);
    }

    function reset() {
      current = start;
      path = [start];
      locked = false;
      app.classList.remove("wrong-mode");
      badge.textContent = "STAGE 1";
      stageTitle.textContent = "森の入口";
      stageText.textContent = "矢印キーかボタンで進み、ひらがなをつなげて一文を完成させます。";
      renderScene("ready");
      renderMaze();
    }

    function renderScene(type) {
      const object = sceneObject(type);
      stageShell.classList.toggle("paused", false);
      stageShell.classList.toggle("walking", true);
      stage.innerHTML = `
        <div class="sky-dot" aria-hidden="true"></div>
        ${scrollLayer("cloud-strip", "cloud-panel", `<span class="cloud one"></span><span class="cloud two"></span><span class="cloud three"></span>`)}
        ${scrollLayer("far-forest", "forest-panel", "")}
        ${scrollLayer("ground-strip", "ground-panel", "")}
        ${scrollLayer("grass-strip", "grass-panel", "")}
        <img id="walkHero" class="walk-hero" src="${walkFrames[walkFrame]}" alt="">
        ${object.html}
        <div class="scene-word">${object.word}</div>
      `;
    }

    function scrollLayer(stripClass, panelClass, content) {
      return `<div class="${stripClass}" aria-hidden="true"><div class="${panelClass}">${content}</div><div class="${panelClass}">${content}</div></div>`;
    }

    function sceneObject(type) {
      const objects = {
        ready: { word: "てくてく", html: `<div class="scene-object flower" aria-hidden="true"></div>` },
        flower: { word: "さいた", html: `<div class="scene-object flower" aria-hidden="true"></div>` },
        cat: { word: "ころころ", html: `<div class="scene-object cat" aria-hidden="true"></div>` },
        stone: { word: "ならべた", html: `<div class="scene-object note" aria-hidden="true">○</div>` },
        lake: { word: "つきのうた", html: `<div class="scene-object note" aria-hidden="true">♪</div>` },
        pie: { word: "おやつ", html: `<div class="scene-object note" aria-hidden="true">●</div>` },
        song: { word: "ららら", html: `<div class="scene-object note" aria-hidden="true">♪</div>` },
        bird: { word: "おてがみ", html: `<div class="scene-object letter" aria-hidden="true"></div>` },
        home: { word: "ついた", html: `<div class="scene-object house" aria-hidden="true"></div>` }
      };
      return objects[type] || objects.ready;
    }

    function connect(ids) {
      for (let i = 0; i < ids.length - 1; i += 1) {
        graph.get(ids[i]).add(ids[i + 1]);
        graph.get(ids[i + 1]).add(ids[i]);
      }
    }

    function writeText(ids, text) {
      const chars = [...text];
      if (ids.length !== chars.length) throw new Error(`${text} の文字数がルート長と違います`);
      chars.forEach((char, index) => labels.set(ids[index], char));
    }

    function validateMaze() {
      const all = new Set([...trunk, ...routeA, ...routeB, ...routeC, ...routeD, ...routeE, ...routeF, ...routeG, ...routeH]);
      if (all.size !== 100 || labels.size !== 100) throw new Error("迷路が100マスで構成されていません");
      const seen = new Set([start]);
      const queue = [start];
      while (queue.length) {
        const id = queue.shift();
        for (const next of graph.get(id)) {
          if (seen.has(next)) continue;
          seen.add(next);
          queue.push(next);
        }
      }
      if (seen.size !== 100) throw new Error("到達できないマスがあります");
      const badCount = [...endings.values()].filter((ending) => !ending.good).length;
      if (badCount < 7) throw new Error("不正解ルートが7本未満です");
    }

    function key(x, y) {
      return `${x},${y}`;
    }

    function toKey([x, y]) {
      return key(x, y);
    }

    function last(items) {
      return items[items.length - 1];
    }
  </script>
</body>
</html>
