<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>案2ベース 左UI整理案</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #30261f;
      --muted: #74685e;
      --wall: #3a2f28;
      --tile: #fff0d1;
      --paper: #fff8eb;
      --rose: #d94755;
      --pink: #f4a0aa;
      --leaf: #558b5e;
      --mint: #e2f2dc;
      --sky: #bde6f4;
      --gold: #efbd4c;
      --line: rgba(58, 47, 40, .18);
      font-family: "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", Meiryo, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 8%, rgba(239, 189, 76, .28) 0 88px, transparent 90px),
        linear-gradient(180deg, #f8f1e4 0, #eef6e9 52%, #fbf0e3 100%);
    }

    .page {
      width: min(1500px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    .intro {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.55rem, 3vw, 2.35rem);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .intro p {
      max-width: 820px;
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
      font-weight: 700;
    }

    .tag {
      flex: 0 0 auto;
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 248, 235, .82);
      font-weight: 1000;
      font-size: .86rem;
    }

    .gallery {
      display: grid;
      gap: 24px;
    }

    .concept {
      border: 1px solid rgba(58, 47, 40, .16);
      border-radius: 12px;
      background: rgba(255, 253, 248, .78);
      box-shadow: 0 18px 48px rgba(72, 53, 32, .12);
      overflow: hidden;
    }

    .concept-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(58, 47, 40, .12);
      background: rgba(255, 249, 238, .82);
    }

    .concept-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.05rem;
      font-weight: 1000;
    }

    .num {
      display: grid;
      place-items: center;
      width: 34px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--rose);
      color: #fffdf8;
      box-shadow: inset 0 -3px 0 rgba(0,0,0,.12);
    }

    .note {
      max-width: 760px;
      color: var(--muted);
      font-size: .84rem;
      line-height: 1.45;
      font-weight: 800;
      text-align: right;
    }

    .mock {
      min-height: 570px;
      display: grid;
      grid-template-columns: minmax(430px, .84fr) minmax(560px, 1.16fr);
      gap: 16px;
      padding: 16px;
      background:
        linear-gradient(90deg, rgba(255, 244, 226, .82), rgba(232, 246, 226, .78)),
        radial-gradient(circle at 24% 15%, rgba(255,255,255,.75) 0 120px, transparent 122px);
    }

    .pane {
      position: relative;
      min-width: 0;
      min-height: 0;
      border: 1px solid rgba(58, 47, 40, .18);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 12px 34px rgba(62, 43, 26, .12);
    }

    .left-pane {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 12px;
      padding: 14px;
      background: rgba(255, 249, 237, .93);
    }

    .scene-pane {
      background: url("assets/scene/background-horizontal-path-v1.png") center / cover no-repeat;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 42px;
    }

    .title {
      font-size: clamp(1.04rem, 2vw, 1.36rem);
      line-height: 1.15;
      font-weight: 1000;
    }

    .stage {
      padding: 7px 10px;
      border: 1px solid rgba(58,47,40,.18);
      border-radius: 999px;
      background: rgba(255,255,255,.78);
      font-size: .8rem;
      font-weight: 1000;
      white-space: nowrap;
    }

    .maze-wrap {
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 4px;
    }

    .maze {
      width: min(100%, 430px, calc(100vh - 250px));
      min-width: 320px;
      aspect-ratio: 1;
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      grid-template-rows: repeat(10, 1fr);
      border: 4px solid var(--wall);
      border-radius: 10px;
      background: var(--wall);
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(58,40,23,.17);
    }

    .cell {
      position: relative;
      display: grid;
      place-items: center;
      border: 1px solid var(--wall);
      background: var(--tile);
      font-size: clamp(.8rem, 1.55vw, 1.08rem);
      line-height: 1;
      font-weight: 1000;
      overflow: hidden;
    }

    .cell::before {
      content: "";
      position: absolute;
      inset: 16%;
      border-radius: 5px;
      background: rgba(255,255,255,.38);
      transform: rotate(-5deg);
    }

    .cell span {
      position: relative;
      z-index: 1;
    }

    .cell.seen { background: #ffd5ca; }
    .cell.now { background: #ee9aa0; }
    .cell.bad { background: #d9edff; }
    .cell.good { background: #ffe28b; }

    .cell.now::after {
      content: "";
      position: absolute;
      z-index: 2;
      left: 50%;
      bottom: 8%;
      width: 42%;
      height: 48%;
      border-radius: 48% 48% 42% 42%;
      background:
        radial-gradient(circle at 50% 34%, #ffd9b2 0 18%, transparent 19%),
        radial-gradient(circle at 39% 33%, #2e251f 0 3%, transparent 3.5%),
        radial-gradient(circle at 61% 33%, #2e251f 0 3%, transparent 3.5%),
        linear-gradient(180deg, #d94755 0 53%, #eb6470 54% 100%);
      border: 2px solid #a72b35;
      transform: translateX(-50%);
    }

    .bottom-ui {
      display: grid;
      gap: 10px;
    }

    .sentence-card {
      padding: 10px 12px;
      border: 1px solid rgba(58,47,40,.16);
      border-radius: 12px;
      background: rgba(255, 253, 247, .88);
      box-shadow: 0 8px 22px rgba(58,47,40,.08);
    }

    .label {
      margin-bottom: 3px;
      color: var(--muted);
      font-size: .74rem;
      font-weight: 1000;
    }

    .sentence {
      min-height: 1.5em;
      font-size: 1.08rem;
      line-height: 1.35;
      font-weight: 1000;
      overflow-wrap: anywhere;
    }

    .tools {
      display: grid;
      grid-template-columns: minmax(110px, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    .restart {
      min-height: 38px;
      border: 1px solid rgba(58,47,40,.24);
      border-radius: 10px;
      background: #fffdf8;
      color: var(--ink);
      font: inherit;
      font-weight: 1000;
      box-shadow: 0 3px 0 rgba(58,47,40,.16);
    }

    .arrows {
      display: grid;
      grid-template-columns: repeat(3, 36px);
      grid-template-rows: repeat(2, 33px);
      gap: 6px;
    }

    .arrow {
      display: grid;
      place-items: center;
      border: 1px solid rgba(58,47,40,.22);
      border-radius: 10px;
      background: #fffdf8;
      font-weight: 1000;
      box-shadow: 0 3px 0 rgba(58,47,40,.14);
    }

    .up { grid-column: 2; }
    .left { grid-column: 1; grid-row: 2; }
    .down { grid-column: 2; grid-row: 2; }
    .right { grid-column: 3; grid-row: 2; }

    .hero {
      position: absolute;
      left: 48%;
      bottom: 16%;
      width: min(29%, 190px);
      transform: translateX(-50%);
      filter: drop-shadow(0 12px 12px rgba(42,31,22,.22));
    }

    .flower {
      position: absolute;
      right: 20%;
      bottom: 18%;
      width: 44px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--pink);
      box-shadow:
        0 -31px 0 -8px var(--pink),
        0 31px 0 -8px var(--pink),
        -31px 0 0 -8px var(--pink),
        31px 0 0 -8px var(--pink),
        0 0 0 13px var(--gold);
    }

    .word {
      position: absolute;
      left: 58%;
      top: 34%;
      transform: translateX(-50%);
      padding: 8px 13px;
      border: 1px solid rgba(58,47,40,.18);
      border-radius: 10px;
      background: rgba(255,253,248,.86);
      font-size: 1.3rem;
      font-weight: 1000;
      box-shadow: 0 8px 20px rgba(58,47,40,.1);
    }

    .caption {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      padding: 11px 13px;
      border: 1px solid rgba(58,47,40,.16);
      border-radius: 12px;
      background: rgba(255, 253, 247, .86);
      backdrop-filter: blur(7px);
      box-shadow: 0 8px 24px rgba(58,47,40,.1);
    }

    .caption-title {
      margin-bottom: 3px;
      font-size: 1.15rem;
      line-height: 1.2;
      font-weight: 1000;
    }

    .caption-text {
      color: var(--muted);
      font-size: .86rem;
      line-height: 1.5;
      font-weight: 700;
    }

    .style-1 .sentence-card {
      border-radius: 12px;
      border-left: 7px solid var(--rose);
      background:
        linear-gradient(90deg, rgba(255, 231, 220, .82), rgba(255,253,247,.9));
    }

    .style-2 .left-pane {
      background:
        linear-gradient(90deg, rgba(255,255,255,.42) 0 1px, transparent 1px) 0 0 / 18px 18px,
        rgba(255,249,237,.94);
    }
    .style-2 .sentence-card {
      border: 0;
      border-radius: 6px;
      background: #fff8de;
      box-shadow:
        inset 0 0 0 1px rgba(119, 89, 48, .18),
        0 8px 20px rgba(58,47,40,.08);
    }
    .style-2 .restart,
    .style-2 .arrow {
      border-radius: 6px;
      background: #f6d990;
    }

    .style-3 .sentence-card {
      position: relative;
      padding-left: 42px;
      background: #fffdf8;
    }
    .style-3 .sentence-card::before {
      content: "";
      position: absolute;
      left: 13px;
      top: 50%;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--rose);
      box-shadow: 0 0 0 6px #ffdfe2;
      transform: translateY(-50%);
    }
    .style-3 .tools {
      grid-template-columns: auto 1fr;
    }
    .style-3 .arrows { order: -1; }

    .style-4 .bottom-ui {
      grid-template-columns: 1fr auto;
      align-items: stretch;
    }
    .style-4 .sentence-card {
      min-height: 96px;
      background: linear-gradient(180deg, #fffdf8, #fff1da);
    }
    .style-4 .tools {
      grid-template-columns: 112px;
      align-content: stretch;
    }
    .style-4 .arrows {
      justify-self: center;
    }

    .style-5 .left-pane {
      background:
        radial-gradient(circle at 10% 8%, rgba(85,139,94,.16) 0 80px, transparent 82px),
        rgba(255,249,237,.94);
    }
    .style-5 .sentence-card {
      border: 2px dashed rgba(85,139,94,.42);
      background: rgba(244, 255, 238, .88);
    }
    .style-5 .restart {
      background: #e6f4df;
    }
    .style-5 .arrow {
      background: #fffdf8;
      border-color: rgba(85,139,94,.38);
    }

    .style-6 .left-pane {
      grid-template-rows: auto minmax(0, 1fr) auto;
      background:
        linear-gradient(180deg, rgba(255,249,237,.94), rgba(246,239,226,.94));
    }
    .style-6 .bottom-ui {
      border-radius: 14px;
      padding: 10px;
      background: rgba(255,255,255,.42);
      box-shadow: inset 0 0 0 1px rgba(58,47,40,.12);
    }
    .style-6 .sentence-card {
      background: rgba(255,253,247,.92);
      box-shadow: none;
    }
    .style-6 .tools {
      grid-template-columns: 1fr auto;
    }

    @media (max-width: 1050px) {
      .mock {
        grid-template-columns: 1fr;
      }

      .scene-pane {
        min-height: 360px;
        grid-row: 1;
      }

      .left-pane {
        grid-row: 2;
      }
    }

    @media (max-width: 680px) {
      .page {
        width: calc(100% - 18px);
        padding-top: 18px;
      }

      .intro,
      .concept-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .note {
        text-align: left;
      }

      .mock {
        padding: 9px;
        gap: 9px;
      }

      .left-pane {
        padding: 10px;
      }

      .maze {
        min-width: 0;
        width: 100%;
      }

      .tools,
      .style-4 .bottom-ui,
      .style-4 .tools {
        grid-template-columns: 1fr;
      }

      .arrows {
        justify-self: center;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="intro">
      <div>
        <h1>案2ベース 左UI整理案</h1>
        <p>右側を広めの角丸アニメーションウィンドウ、左側を迷路ウィンドウとして分ける方向は維持。左側は迷路と下部UIが重ならない固定レイアウトにし、ボタンや文章表示をゲームの世界観へ寄せた比較案です。</p>
      </div>
      <div class="tag">迷路とUIは非重なり</div>
    </header>

    <div class="gallery" id="gallery"></div>
  </main>

  <template id="template">
    <section class="concept">
      <div class="concept-head">
        <div class="concept-title"><span class="num"></span><span class="name"></span></div>
        <div class="note"></div>
      </div>
      <div class="mock">
        <section class="pane left-pane">
          <div class="top">
            <div class="title">文字迷路の赤ずきん</div>
            <div class="stage">STAGE 1</div>
          </div>
          <div class="maze-wrap">
            <div class="maze"></div>
          </div>
          <div class="bottom-ui">
            <div class="sentence-card">
              <div class="label">できかけの一文</div>
              <div class="sentence">あかずきんはきょうも</div>
            </div>
            <div class="tools">
              <button class="restart" type="button">はじめから</button>
              <div class="arrows" aria-label="移動">
                <div class="arrow up">↑</div>
                <div class="arrow left">←</div>
                <div class="arrow down">↓</div>
                <div class="arrow right">→</div>
              </div>
            </div>
          </div>
        </section>
        <section class="pane scene-pane">
          <img class="hero" src="assets/red-walk/sticker/red-riding-hood-walk-sticker.png" alt="">
          <div class="flower"></div>
          <div class="word">てくてく</div>
          <div class="caption">
            <div class="caption-title">森の入口</div>
            <div class="caption-text">赤ずきんが道を歩き出しました。次の文字で物語が少しずつ変わります。</div>
          </div>
        </section>
      </div>
    </section>
  </template>

  <script>
    const styles = [
      {
        className: "style-1",
        name: "赤いしおり型",
        note: "できかけの一文を赤いしおり風に強調。既存の赤ずきん感を残しつつ、システム感を減らす。"
      },
      {
        className: "style-2",
        name: "木札と方眼紙",
        note: "下部操作を木札っぽくし、左全体は薄い方眼紙。迷路ゲームらしさと手作り感を両立。"
      },
      {
        className: "style-3",
        name: "赤い封ろうの手紙",
        note: "文章欄を手紙として扱う案。物語の一文を作っている意味が視覚的に伝わりやすい。"
      },
      {
        className: "style-4",
        name: "下部ツールトレイ",
        note: "文章と操作を横並びのトレイに整理。迷路面積を保ちつつ、操作の所在を明確にする。"
      },
      {
        className: "style-5",
        name: "森のメモカード",
        note: "緑の点線カードで柔らかくまとめる案。右の森背景ともつながり、画面全体がなじむ。"
      },
      {
        className: "style-6",
        name: "半透明の絵本UI",
        note: "下部UIを一つの淡いパネルにまとめる案。部品が散らからず、実装時も扱いやすい。"
      }
    ];

    const chars = [..."たいそあとみたをきいでさんだこてべたよたちみでこねならうのきながばろひをしみでつはいきんはこいうずみあかずきんはきょうもまいぱんがとはうばおみをいたうりにてあさんたべをうたすがへんなでたうたわをみいく"];
    const gallery = document.querySelector("#gallery");
    const template = document.querySelector("#template");

    styles.forEach((item, index) => {
      const node = template.content.firstElementChild.cloneNode(true);
      node.classList.add(item.className);
      node.querySelector(".num").textContent = String(index + 1).padStart(2, "0");
      node.querySelector(".name").textContent = item.name;
      node.querySelector(".note").textContent = item.note;

      const maze = node.querySelector(".maze");
      chars.slice(0, 100).forEach((char, cellIndex) => {
        const cell = document.createElement("div");
        cell.className = "cell";
        if ([50, 51, 52, 53, 54, 55].includes(cellIndex)) cell.classList.add("seen");
        if (cellIndex === 55) cell.classList.add("now");
        if ([9, 73, 99].includes(cellIndex)) cell.classList.add("bad");
        if (cellIndex === 89) cell.classList.add("good");
        cell.innerHTML = `<span>${char}</span>`;
        maze.append(cell);
      });

      gallery.append(node);
    });
  </script>
</body>
</html>
