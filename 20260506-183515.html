<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>文字迷路の赤ずきん 10x10</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #2b241f;
      --muted: #6d6258;
      --cream: #fff7e8;
      --paper: rgba(255, 249, 237, .92);
      --wall: #3b312b;
      --tile: #fff0d3;
      --seen: #ffd3c8;
      --now: #ef9b96;
      --red: #d83d48;
      --green: #3d7d58;
      --blue: #86c7e8;
      --gold: #f1b83f;
      font-family: "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", Meiryo, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: linear-gradient(180deg, #bfe9ff 0 44%, #a9d78e 44% 100%);
      overflow-x: hidden;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(520px, 1.04fr) minmax(360px, .96fr);
      grid-template-rows: minmax(0, 1fr);
    }

    .stage-shell {
      position: relative;
      grid-column: 2;
      overflow: hidden;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 14%, rgba(255, 217, 92, .88) 0 38px, transparent 39px),
        linear-gradient(180deg, rgba(255,255,255,.24), rgba(255,255,255,0) 38%);
    }

    .topbar {
      position: absolute;
      z-index: 5;
      inset: 16px 18px auto;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 3.2vw, 2.35rem);
      line-height: 1.08;
      letter-spacing: 0;
      text-shadow: 0 2px 0 rgba(255,255,255,.62);
    }

    .badge {
      min-width: 98px;
      padding: 8px 12px;
      border: 2px solid rgba(59,49,43,.2);
      border-radius: 8px;
      background: rgba(255, 250, 239, .88);
      text-align: center;
      font-weight: 900;
      white-space: nowrap;
    }

    .stage-caption {
      position: absolute;
      z-index: 5;
      left: 50%;
      bottom: 12px;
      width: min(680px, calc(100% - 24px));
      transform: translateX(-50%);
      display: grid;
      gap: 4px;
      padding: 10px 12px;
      border: 2px solid rgba(59,49,43,.16);
      border-radius: 8px;
      background: rgba(255, 250, 239, .82);
      backdrop-filter: blur(8px);
    }

    .stage-title {
      font-size: clamp(1.05rem, 2.2vw, 1.55rem);
      font-weight: 900;
    }

    .stage-text {
      color: var(--muted);
      font-size: clamp(.88rem, 1.8vw, 1rem);
      line-height: 1.45;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .cloud { animation: drift 18s linear infinite; }
    .cloud.c2 { animation-duration: 23s; animation-delay: -7s; }
    .tree-top { animation: sway 3.5s ease-in-out infinite; transform-origin: center bottom; }
    .hood { animation: heroWalk 1.1s ease-in-out infinite; transform-origin: 50% 100%; }
    .wolf { animation: peek 1.8s ease-in-out infinite; transform-origin: 50% 100%; }
    .butterfly { animation: flutter 2.2s ease-in-out infinite; }
    .prop-a { animation: popDance 1.25s ease-in-out infinite; transform-origin: center; }
    .prop-b { animation: popDance 1.45s ease-in-out infinite reverse; transform-origin: center; }
    .prop-c { animation: bob 1.35s ease-in-out infinite; transform-origin: center; }
    .note { animation: floatUp 2s ease-in-out infinite; opacity: 0; }
    .note.n2 { animation-delay: .45s; }
    .note.n3 { animation-delay: .9s; }
    .letter { animation: letterFly 2.5s ease-in-out infinite; }
    .moon { animation: moonGlow 2s ease-in-out infinite; }
    .wrong-mode .stage-shell { background: linear-gradient(180deg, #c7d0ff 0 44%, #acd590 44% 100%); }
    .wrong-mode .hood { animation: surprised 1s ease-in-out infinite; }

    .picturebook .line {
      fill: none;
      stroke: #2f241d;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: url(#inkWobble);
    }

    .picturebook .fine-line {
      fill: none;
      stroke: rgba(47, 36, 29, .72);
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: url(#inkWobble);
    }

    .picturebook .paint { filter: url(#paintBleed); }
    .picturebook .paper-edge { pointer-events: none; }
    .picturebook .walk-bob { animation: stageWalkBob .72s ease-in-out infinite; transform-origin: 50% 100%; }
    .picturebook .cape-breathe { animation: capeBreathe .72s ease-in-out infinite; transform-origin: 50% 70%; }
    .picturebook .face-happy { animation: faceHappy .9s ease-in-out infinite; transform-origin: center; }
    .picturebook .bud-rise { animation: budRise 4.8s cubic-bezier(.2,.8,.2,1) forwards; transform-origin: 50% 100%; }
    .picturebook .stem-grow { animation: stemGrow 4.8s cubic-bezier(.2,.8,.2,1) forwards; transform-origin: 50% 100%; }
    .picturebook .petal-open { animation: petalOpen 4.8s cubic-bezier(.2,.8,.2,1) forwards; transform-origin: center; }
    .picturebook .joy-hop { animation: joyHop 4.8s ease-in-out forwards; transform-origin: 50% 100%; }
    .picturebook .sparkle { animation: sparklePop 4.8s ease-in-out forwards; opacity: 0; transform-origin: center; }
    .picturebook .red-art {
      filter: drop-shadow(0 9px 8px rgba(38, 27, 20, .22));
      transform-origin: 50% 100%;
    }

    .play {
      position: relative;
      z-index: 6;
      grid-column: 1;
      grid-row: 1;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      width: 100%;
      min-height: 100vh;
      margin: 0;
      background: var(--paper);
      border-right: 4px solid rgba(59,49,43,.18);
      box-shadow: 18px 0 52px rgba(37, 76, 54, .14);
    }

    .maze-pad {
      display: grid;
      place-items: center;
      min-height: 0;
      padding: 14px;
      overflow-x: auto;
    }

    .maze {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      grid-template-rows: repeat(10, minmax(0, 1fr));
      width: min(100%, calc(100vh - 166px));
      min-width: 0;
      background: var(--wall);
      border: 4px solid var(--wall);
      border-radius: 8px;
      overflow: hidden;
    }

    .cell {
      position: relative;
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 0;
      aspect-ratio: 1;
      border: 2px solid var(--wall);
      background: var(--tile);
      font-weight: 900;
      font-size: clamp(1.05rem, 3.2vw, 1.55rem);
      line-height: 1;
      user-select: none;
      overflow: hidden;
    }

    .cell::before {
      content: "";
      position: absolute;
      inset: 13%;
      border-radius: 6px;
      background: rgba(255,255,255,.36);
      transform: rotate(-5deg);
    }

    .cell span {
      position: relative;
      z-index: 1;
    }

    .cell.visited { background: var(--seen); }
    .cell.current {
      background: var(--now);
      animation: cellPop .24s ease-out;
    }

    .cell.current::after {
      content: "";
      position: absolute;
      z-index: 2;
      left: 50%;
      bottom: 8%;
      width: 54%;
      height: 78%;
      background: url("assets/red-riding-hood-v1.png") center bottom / contain no-repeat;
      filter: drop-shadow(0 2px 0 rgba(59,49,43,.26));
      transform: translateX(-50%);
      animation: miniWalk .72s ease-in-out infinite;
    }

    .cell.current span {
      z-index: 3;
      transform: translateY(-32%);
      padding: 1px 4px;
      border-radius: 6px;
      background: rgba(255, 250, 239, .74);
      text-shadow: 0 1px 0 #fff;
    }

    .cell.goal { background: #ffe28b; }
    .cell.bad { background: #d6ebff; }

    .sentence-panel {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 10px 12px 12px;
      border-top: 2px solid rgba(59,49,43,.08);
    }

    .label {
      color: var(--muted);
      font-size: .82rem;
      font-weight: 900;
    }

    .sentence {
      min-height: 2.8em;
      font-size: clamp(1rem, 2.35vw, 1.45rem);
      font-weight: 900;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, 46px);
      grid-template-rows: repeat(2, 42px);
      gap: 8px;
      justify-content: end;
      margin-top: 8px;
    }

    button {
      border: 2px solid rgba(59,49,43,.22);
      border-radius: 8px;
      background: #fffdf7;
      color: var(--ink);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 3px 0 rgba(59,49,43,.18);
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 rgba(59,49,43,.18);
    }

    .restart {
      width: 100%;
      padding: 7px 12px;
    }

    .up { grid-column: 2; }
    .left { grid-column: 1; grid-row: 2; }
    .down { grid-column: 2; grid-row: 2; }
    .right { grid-column: 3; grid-row: 2; }

    @keyframes drift {
      from { transform: translateX(-130px); }
      to { transform: translateX(1120px); }
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-1deg); }
      50% { transform: rotate(2deg); }
    }

    @keyframes heroWalk {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-8px) rotate(2deg); }
    }

    @keyframes peek {
      0%, 100% { transform: translateY(0) scaleX(1); }
      50% { transform: translateY(-12px) scaleX(.96); }
    }

    @keyframes flutter {
      0%, 100% { transform: translate(0, 0) rotate(-8deg); }
      50% { transform: translate(18px, -18px) rotate(12deg); }
    }

    @keyframes popDance {
      0%, 100% { transform: translateY(0) rotate(-4deg) scale(1); }
      50% { transform: translateY(-16px) rotate(5deg) scale(1.08); }
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
    }

    @keyframes floatUp {
      0% { transform: translateY(18px); opacity: 0; }
      35%, 70% { opacity: 1; }
      100% { transform: translateY(-54px); opacity: 0; }
    }

    @keyframes letterFly {
      0%, 100% { transform: translate(0, 0) rotate(-8deg); }
      50% { transform: translate(120px, -44px) rotate(9deg); }
    }

    @keyframes moonGlow {
      0%, 100% { opacity: .75; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.08); }
    }

    @keyframes surprised {
      0%, 100% { transform: translateY(0) rotate(-7deg); }
      50% { transform: translateY(-10px) rotate(7deg); }
    }

    @keyframes stageWalkBob {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-7px) rotate(1.5deg); }
    }

    @keyframes capeBreathe {
      0%, 100% { transform: skewX(0deg) translateX(0); }
      50% { transform: skewX(-8deg) translateX(-4px); }
    }

    @keyframes faceHappy {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    @keyframes budRise {
      0%, 18% { transform: scale(.08) translateY(54px); opacity: 0; }
      30% { opacity: 1; }
      58%, 100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    @keyframes stemGrow {
      0%, 20% { transform: scaleY(.05); opacity: 0; }
      34% { opacity: 1; }
      62%, 100% { transform: scaleY(1); opacity: 1; }
    }

    @keyframes petalOpen {
      0%, 46% { transform: scale(.08) rotate(-18deg); opacity: 0; }
      58% { opacity: 1; }
      74% { transform: scale(1.12) rotate(3deg); opacity: 1; }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }

    @keyframes joyHop {
      0%, 34% { transform: translate(0, 0) rotate(0); }
      48% { transform: translate(38px, -4px) rotate(0); }
      64% { transform: translate(54px, -18px) rotate(-4deg); }
      78%, 100% { transform: translate(54px, 0) rotate(-2deg); }
    }

    @keyframes sparklePop {
      0%, 60% { transform: scale(.2); opacity: 0; }
      70% { opacity: 1; }
      86% { transform: scale(1.1); opacity: .9; }
      100% { transform: scale(.94); opacity: .45; }
    }

    @keyframes cellPop {
      0% { transform: scale(.92); }
      70% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    @keyframes miniWalk {
      0%, 100% { transform: translateX(-50%) translateY(0) rotate(-2deg); }
      50% { transform: translateX(-50%) translateY(-5%) rotate(2deg); }
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(330px, 44vh) auto;
      }

      .stage-shell {
        grid-column: 1;
        min-height: 0;
      }

      .play {
        grid-column: 1;
        grid-row: 2;
        min-height: 0;
        border-right: 0;
        border-top: 4px solid rgba(59,49,43,.2);
        box-shadow: 0 -18px 52px rgba(37, 76, 54, .16);
      }

      .maze {
        width: 100%;
        min-width: 540px;
      }
    }

    @media (max-width: 740px) {
      .app { grid-template-rows: minmax(330px, 44vh) auto; }
      .topbar { inset: 10px 12px auto; }
      .badge { min-width: 82px; padding: 7px 9px; font-size: .9rem; }
      .stage-caption { bottom: 8px; }
      .sentence-panel { grid-template-columns: 1fr; }
      .controls { justify-content: center; }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <section class="stage-shell" aria-label="物語アニメーション">
      <div class="topbar">
        <h1>文字迷路の赤ずきん</h1>
        <div class="badge" id="badge">STAGE 1</div>
      </div>
      <svg id="stage" viewBox="0 0 1000 420" role="img" aria-label="赤ずきんのアニメーション"></svg>
      <div class="stage-caption">
        <div class="stage-title" id="stageTitle">森の入口</div>
        <div class="stage-text" id="stageText">矢印キーかボタンで進み、ひらがなをつなげて一文を完成させます。</div>
      </div>
    </section>

    <section class="play" aria-label="文字迷路">
      <div class="maze-pad">
        <div class="maze" id="maze" aria-live="polite"></div>
      </div>
      <div class="sentence-panel">
        <div>
          <div class="label">できかけの一文</div>
          <div class="sentence" id="sentence"></div>
        </div>
        <div>
          <button class="restart" id="restart">はじめから</button>
          <div class="controls" aria-label="移動">
            <button class="up" data-move="0,-1" aria-label="上へ">↑</button>
            <button class="left" data-move="-1,0" aria-label="左へ">←</button>
            <button class="down" data-move="0,1" aria-label="下へ">↓</button>
            <button class="right" data-move="1,0" aria-label="右へ">→</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const cols = 10;
    const rows = 10;
    const start = key(0, 5);

    const trunk = Array.from({ length: 10 }, (_, x) => key(x, 5));
    const routeA = [[1,4],[0,4],[0,3],[1,3],[1,2],[0,2],[0,1],[1,1],[1,0],[0,0]].map(toKey);
    const routeB = [[2,4],[3,4],[4,4],[4,3],[3,3],[2,3],[2,2],[3,2],[4,2],[4,1],[4,0],[3,0],[2,0],[2,1],[3,1]].map(toKey);
    const routeC = [[5,4],[6,4],[6,3],[5,3],[5,2],[6,2],[6,1],[5,1],[5,0],[6,0]].map(toKey);
    const routeD = [[9,4],[8,4],[7,4],[7,3],[8,3],[9,3],[9,2],[8,2],[7,2],[7,1],[7,0],[8,0],[9,0],[9,1],[8,1]].map(toKey);
    const routeE = [[0,6],[1,6],[2,6],[2,7],[1,7],[0,7],[0,8],[0,9],[1,9],[2,9],[2,8],[1,8]].map(toKey);
    const routeF = [[3,6],[4,6],[4,7],[3,7],[3,8],[4,8],[4,9],[3,9]].map(toKey);
    const routeG = [[7,6],[6,6],[5,6],[5,7],[6,7],[7,7],[7,8],[7,9],[6,9],[5,9],[5,8],[6,8]].map(toKey);
    const routeH = [[9,6],[8,6],[8,7],[9,7],[9,8],[8,8],[8,9],[9,9]].map(toKey);

    const labels = new Map();
    writeText(trunk, "あかずきんはきょうも");
    writeText([...trunk.slice(0, 2), ...routeA], "あかいはながみちでさいた");
    writeText([...trunk.slice(0, 3), ...routeB], "あかずきんはひろばでこねことあそんだ");
    writeText([...trunk.slice(0, 6), ...routeC], "あかずきんはこいしをならべてみた");
    writeText([...trunk, ...routeD], "あかずきんはきょうもみずうみでつきのうたをきいたよ");
    writeText([trunk[0], ...routeE], "あまいぱいをみんなでたべた");
    writeText([...trunk.slice(0, 4), ...routeF], "あかずきんがうたをうたう");
    writeText([...trunk.slice(0, 8), ...routeG], "あかずきんはきょうはとりにてがみをわたす");
    writeText([...trunk, ...routeH], "あかずきんはきょうもおばあさんへいく");

    const graph = new Map();
    for (let y = 0; y < rows; y += 1) {
      for (let x = 0; x < cols; x += 1) graph.set(key(x, y), new Set());
    }
    connect(trunk);
    connect([key(1, 5), ...routeA]);
    connect([key(2, 5), ...routeB]);
    connect([key(5, 5), ...routeC]);
    connect([key(9, 5), ...routeD]);
    connect([key(0, 5), ...routeE]);
    connect([key(3, 5), ...routeF]);
    connect([key(7, 5), ...routeG]);
    connect([key(9, 5), ...routeH]);

    const endings = new Map([
      [last(routeA), { type: "flower", good: false, title: "あかい花の道", text: "赤い花が道に咲き、赤ずきんは見とれて足を止めました。" }],
      [last(routeB), { type: "cat", good: false, title: "こねこと広場", text: "広場のこねこが毛糸を転がし、赤ずきんはつい遊んでしまいました。" }],
      [last(routeC), { type: "stone", good: false, title: "こいしのならべっこ", text: "赤ずきんは小石を星の形に並べて、すっかり道草をしました。" }],
      [last(routeD), { type: "lake", good: false, title: "湖と月の歌", text: "湖に映る月が歌いだし、赤ずきんは夜まで聞き入ってしまいました。" }],
      [last(routeE), { type: "pie", good: false, title: "甘いパイの会", text: "甘いパイの香りに誘われ、森のみんなでおやつ会が始まりました。" }],
      [last(routeF), { type: "song", good: false, title: "歌う赤ずきん", text: "赤ずきんは小さな舞台で歌い、森の木々が手拍子しました。" }],
      [last(routeG), { type: "bird", good: false, title: "鳥への手紙", text: "赤ずきんは鳥に手紙を渡し、空の郵便屋さんを見送りました。" }],
      [last(routeH), { type: "home", good: true, title: "おばあさんの家へ", text: "赤ずきんは今日もおばあさんの家へ、まっすぐ歩いていきました。" }]
    ]);

    const app = document.querySelector("#app");
    const stage = document.querySelector("#stage");
    const maze = document.querySelector("#maze");
    const sentence = document.querySelector("#sentence");
    const badge = document.querySelector("#badge");
    const stageTitle = document.querySelector("#stageTitle");
    const stageText = document.querySelector("#stageText");
    const cells = new Map();
    let current = start;
    let path = [start];
    let locked = false;

    validateMaze();
    buildMaze();
    renderScene("ready");
    renderMaze();

    document.querySelectorAll("[data-move]").forEach((button) => {
      button.addEventListener("click", () => {
        const [dx, dy] = button.dataset.move.split(",").map(Number);
        move(dx, dy);
      });
    });
    document.querySelector("#restart").addEventListener("click", reset);
    window.addEventListener("keydown", (event) => {
      const moves = {
        ArrowUp: [0, -1], w: [0, -1],
        ArrowDown: [0, 1], s: [0, 1],
        ArrowLeft: [-1, 0], a: [-1, 0],
        ArrowRight: [1, 0], d: [1, 0]
      };
      if (!moves[event.key]) return;
      event.preventDefault();
      move(...moves[event.key]);
    });

    function buildMaze() {
      maze.innerHTML = "";
      for (let y = 0; y < rows; y += 1) {
        for (let x = 0; x < cols; x += 1) {
          const id = key(x, y);
          const cell = document.createElement("div");
          cell.className = "cell";
          cell.innerHTML = `<span>${labels.get(id)}</span>`;
          setWalls(cell, x, y);
          if (endings.has(id)) cell.classList.add(endings.get(id).good ? "goal" : "bad");
          maze.append(cell);
          cells.set(id, cell);
        }
      }
    }

    function setWalls(cell, x, y) {
      const open = graph.get(key(x, y));
      cell.style.borderTopWidth = open.has(key(x, y - 1)) ? "0" : "2px";
      cell.style.borderRightWidth = open.has(key(x + 1, y)) ? "0" : "2px";
      cell.style.borderBottomWidth = open.has(key(x, y + 1)) ? "0" : "2px";
      cell.style.borderLeftWidth = open.has(key(x - 1, y)) ? "0" : "2px";
    }

    function move(dx, dy) {
      if (locked) return;
      const [x, y] = current.split(",").map(Number);
      const next = key(x + dx, y + dy);
      if (!graph.get(current).has(next)) {
        cells.get(current).animate([
          { transform: "translateX(0)" },
          { transform: "translateX(-5px)" },
          { transform: "translateX(5px)" },
          { transform: "translateX(0)" }
        ], { duration: 170, easing: "ease-out" });
        return;
      }
      current = next;
      const old = path.indexOf(next);
      path = old >= 0 ? path.slice(0, old + 1) : [...path, next];
      renderMaze();
      if (endings.has(current)) finish(endings.get(current));
    }

    function renderMaze() {
      for (const [id, cell] of cells) {
        cell.classList.toggle("visited", path.includes(id));
        cell.classList.toggle("current", id === current);
      }
      sentence.textContent = path.map((id) => labels.get(id)).join("");
    }

    function finish(ending) {
      locked = true;
      app.classList.toggle("wrong-mode", !ending.good);
      badge.textContent = ending.good ? "CLEAR" : "やりなおし";
      stageTitle.textContent = ending.title;
      stageText.textContent = ending.text;
      renderScene(ending.type);
      if (!ending.good) window.setTimeout(reset, 5200);
    }

    function reset() {
      current = start;
      path = [start];
      locked = false;
      app.classList.remove("wrong-mode");
      badge.textContent = "STAGE 1";
      stageTitle.textContent = "森の入口";
      stageText.textContent = "矢印キーかボタンで進み、ひらがなをつなげて一文を完成させます。";
      renderScene("ready");
      renderMaze();
    }

    function renderScene(type) {
      stage.innerHTML = `
        <defs>
          <filter id="paintBleed" x="-8%" y="-8%" width="116%" height="116%">
            <feTurbulence type="fractalNoise" baseFrequency=".018 .04" numOctaves="2" seed="11"></feTurbulence>
            <feDisplacementMap in="SourceGraphic" scale="2.8"></feDisplacementMap>
          </filter>
          <filter id="inkWobble" x="-8%" y="-8%" width="116%" height="116%">
            <feTurbulence type="fractalNoise" baseFrequency=".09" numOctaves="1" seed="3"></feTurbulence>
            <feDisplacementMap in="SourceGraphic" scale="1.2"></feDisplacementMap>
          </filter>
          <radialGradient id="paperTone" cx="50%" cy="45%" r="72%">
            <stop offset="0" stop-color="#f4d889"></stop>
            <stop offset=".56" stop-color="#aac077"></stop>
            <stop offset="1" stop-color="#594638"></stop>
          </radialGradient>
        </defs>
        <g class="picturebook">
          ${sceneBase()}
          ${type === "flower" ? flowerScene() : defaultWalkingScene(type)}
        </g>
      `;
    }

    function sceneBase() {
      return `
        <rect width="1000" height="420" fill="url(#paperTone)"></rect>
        <rect width="1000" height="420" fill="#f7e3a6" opacity=".18" filter="url(#paintBleed)"></rect>
        <path d="M0 280 C152 232 270 286 418 242 C596 190 780 246 1000 212 L1000 420 L0 420 Z" fill="#839f61" opacity=".84" class="paint"></path>
        <path d="M74 366 C220 300 374 282 522 284 C710 286 832 326 954 374" fill="none" stroke="#c79d62" stroke-width="68" stroke-linecap="round" opacity=".78" class="paint"></path>
        <path d="M74 366 C220 300 374 282 522 284 C710 286 832 326 954 374" class="fine-line" opacity=".45"></path>
        <g opacity=".28">
          <path d="M86 72 C132 34 194 42 220 88 C262 50 326 68 334 124 C360 172 296 204 244 174 C210 212 132 206 126 150 C72 146 52 104 86 72 Z" fill="#557a52" class="paint"></path>
          <path d="M762 78 C812 38 880 46 908 96 C950 66 998 94 1002 142 C984 182 926 188 890 164 C858 206 780 200 772 148 C724 142 724 104 762 78 Z" fill="#5d8054" class="paint"></path>
        </g>
        <rect class="paper-edge" x="12" y="12" width="976" height="396" fill="none" stroke="rgba(38,28,22,.34)" stroke-width="24"></rect>
      `;
    }

    function defaultWalkingScene(type) {
      if (type !== "ready") return genericSimpleScene(type);
      return `
        <g>
          <g>
            <animateMotion dur="5.8s" repeatCount="indefinite" path="M150 236 C292 184 470 188 606 220 C724 248 806 272 888 284"></animateMotion>
            ${littleRed({ mood: "calm", scale: 1 })}
          </g>
        </g>
      `;
    }

    function flowerScene() {
      return `
        <g transform="translate(438 266)" class="joy-hop">
          ${littleRed({ mood: "happy", scale: 1.05 })}
        </g>
        <g transform="translate(640 302)">
          <path class="stem-grow" d="M0 52 C-6 32 7 20 0 0" stroke="#416d42" stroke-width="8" stroke-linecap="round"></path>
          <g class="bud-rise">
            <ellipse cx="0" cy="0" rx="18" ry="24" fill="#7a9c4e" class="paint"></ellipse>
            <path d="M-14 14 C-9 -6 8 -18 15 10" class="fine-line"></path>
          </g>
          <g class="petal-open">
            <circle cx="0" cy="0" r="14" fill="#f1c64f" class="paint"></circle>
            <ellipse cx="-26" cy="0" rx="22" ry="16" fill="#c93f43" class="paint"></ellipse>
            <ellipse cx="26" cy="0" rx="22" ry="16" fill="#d95545" class="paint"></ellipse>
            <ellipse cx="0" cy="-26" rx="17" ry="23" fill="#d24a42" class="paint"></ellipse>
            <ellipse cx="0" cy="26" rx="17" ry="23" fill="#b93646" class="paint"></ellipse>
            <path d="M-26 0 C-24 -16 -8 -20 0 -14 C10 -22 26 -16 26 0 C34 12 18 27 0 26 C-17 31 -34 13 -26 0 Z" class="line"></path>
          </g>
          <g class="sparkle" style="animation-delay:.12s">
            <path d="M-82 -24 L-72 -2 L-50 8 L-72 18 L-84 40 L-94 18 L-116 8 L-94 -2 Z" fill="#fff0a8" opacity=".86"></path>
            <path d="M84 -44 L92 -25 L112 -18 L94 -9 L86 12 L76 -8 L56 -16 L76 -25 Z" fill="#fff0a8" opacity=".74"></path>
          </g>
        </g>
      `;
    }

    function littleRed({ mood, scale }) {
      return `<g transform="scale(${scale})">
        <ellipse cx="0" cy="112" rx="44" ry="11" fill="rgba(40,30,24,.2)"></ellipse>
        <g class="walk-bob">
          <image class="red-art" href="assets/red-riding-hood-v1.png" x="-62" y="-66" width="124" height="186" preserveAspectRatio="xMidYMax meet"></image>
        </g>
      </g>`;
    }

    function genericSimpleScene(type) {
      return `
        <g transform="translate(462 262)">
          ${littleRed({ mood: type === "home" ? "happy" : "calm", scale: 1 })}
        </g>
        ${sceneProps(type)}
      `;
    }

    function sceneProps(type) {
      const props = {
        cat: `<g transform="translate(650 316)"><ellipse cx="0" cy="20" rx="54" ry="30" fill="#c8874d" class="paint"></ellipse><path d="M-42 -8 L-28 18 L-8 0 L8 18 L28 -8" class="line"></path></g>`,
        stone: `<g transform="translate(640 326)"><circle cx="-42" cy="0" r="16" fill="#858982" class="paint"></circle><circle cx="0" cy="-18" r="15" fill="#9b9a91" class="paint"></circle><circle cx="42" cy="0" r="17" fill="#777b78" class="paint"></circle></g>`,
        lake: `<g transform="translate(668 298)"><ellipse cx="0" cy="42" rx="152" ry="45" fill="#6fa6b8" class="paint"></ellipse><circle cx="-48" cy="-38" r="34" fill="#f1db72" class="paint"></circle></g>`,
        pie: `<g transform="translate(664 326)"><circle cx="-38" cy="0" r="38" fill="#c98545" class="paint"></circle><circle cx="42" cy="8" r="24" fill="#f0cf68" class="paint"></circle></g>`,
        song: `<g transform="translate(642 282)"><text class="note" x="-36" y="0" font-size="52" fill="#bd3d48">♪</text><text class="note n2" x="34" y="-20" font-size="48" fill="#2f7656">♪</text></g>`,
        bird: `<g transform="translate(650 224)"><path d="M0 0 C-56 -32 -88 24 -24 40 Z" fill="#5d94aa" class="paint"></path><path d="M0 0 C56 -32 88 24 24 40 Z" fill="#80adbd" class="paint"></path></g>`,
        home: `<g transform="translate(682 236)"><rect x="0" y="70" width="150" height="110" fill="#e7bf75" class="paint"></rect><path d="M-14 78 L75 0 L164 78 Z" fill="#a54838" class="paint"></path><path d="M0 180 V70 H150 V180 M-14 78 L75 0 L164 78" class="line"></path></g>`
      };
      return props[type] || "";
    }

    function connect(ids) {
      for (let i = 0; i < ids.length - 1; i += 1) {
        graph.get(ids[i]).add(ids[i + 1]);
        graph.get(ids[i + 1]).add(ids[i]);
      }
    }

    function writeText(ids, text) {
      const chars = [...text];
      if (ids.length !== chars.length) throw new Error(`${text} の文字数がルート長と違います`);
      chars.forEach((char, index) => labels.set(ids[index], char));
    }

    function validateMaze() {
      const all = new Set([...trunk, ...routeA, ...routeB, ...routeC, ...routeD, ...routeE, ...routeF, ...routeG, ...routeH]);
      if (all.size !== 100 || labels.size !== 100) throw new Error("迷路が100マスで構成されていません");
      const seen = new Set([start]);
      const queue = [start];
      while (queue.length) {
        const id = queue.shift();
        for (const next of graph.get(id)) {
          if (seen.has(next)) continue;
          seen.add(next);
          queue.push(next);
        }
      }
      if (seen.size !== 100) throw new Error("到達できないマスがあります");
      const badCount = [...endings.values()].filter((ending) => !ending.good).length;
      if (badCount < 7) throw new Error("不正解ルートが7本未満です");
    }

    function key(x, y) {
      return `${x},${y}`;
    }

    function toKey([x, y]) {
      return key(x, y);
    }

    function last(items) {
      return items[items.length - 1];
    }
  </script>
</body>
