<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>文字迷路の赤ずきん 10x10</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #2b241f;
      --muted: #6d6258;
      --cream: #fff7e8;
      --paper: rgba(255, 249, 237, .92);
      --wall: #3b312b;
      --tile: #fff0d3;
      --seen: #ffd3c8;
      --now: #ef9b96;
      --red: #d83d48;
      --green: #3d7d58;
      --blue: #86c7e8;
      --gold: #f1b83f;
      font-family: "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", Meiryo, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: linear-gradient(180deg, #bfe9ff 0 44%, #a9d78e 44% 100%);
      overflow-x: hidden;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(520px, 1.04fr) minmax(360px, .96fr);
      grid-template-rows: minmax(0, 1fr);
    }

    .stage-shell {
      position: relative;
      grid-column: 2;
      overflow: hidden;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 14%, rgba(255, 217, 92, .88) 0 38px, transparent 39px),
        linear-gradient(180deg, rgba(255,255,255,.24), rgba(255,255,255,0) 38%);
    }

    .topbar {
      position: absolute;
      z-index: 5;
      inset: 16px 18px auto;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 3.2vw, 2.35rem);
      line-height: 1.08;
      letter-spacing: 0;
      text-shadow: 0 2px 0 rgba(255,255,255,.62);
    }

    .badge {
      min-width: 98px;
      padding: 8px 12px;
      border: 2px solid rgba(59,49,43,.2);
      border-radius: 8px;
      background: rgba(255, 250, 239, .88);
      text-align: center;
      font-weight: 900;
      white-space: nowrap;
    }

    .stage-caption {
      position: absolute;
      z-index: 5;
      left: 50%;
      bottom: 12px;
      width: min(680px, calc(100% - 24px));
      transform: translateX(-50%);
      display: grid;
      gap: 4px;
      padding: 10px 12px;
      border: 2px solid rgba(59,49,43,.16);
      border-radius: 8px;
      background: rgba(255, 250, 239, .82);
      backdrop-filter: blur(8px);
    }

    .stage-title {
      font-size: clamp(1.05rem, 2.2vw, 1.55rem);
      font-weight: 900;
    }

    .stage-text {
      color: var(--muted);
      font-size: clamp(.88rem, 1.8vw, 1rem);
      line-height: 1.45;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .cloud { animation: drift 18s linear infinite; }
    .cloud.c2 { animation-duration: 23s; animation-delay: -7s; }
    .tree-top { animation: sway 3.5s ease-in-out infinite; transform-origin: center bottom; }
    .hood { animation: heroWalk 1.1s ease-in-out infinite; transform-origin: 50% 100%; }
    .wolf { animation: peek 1.8s ease-in-out infinite; transform-origin: 50% 100%; }
    .butterfly { animation: flutter 2.2s ease-in-out infinite; }
    .prop-a { animation: popDance 1.25s ease-in-out infinite; transform-origin: center; }
    .prop-b { animation: popDance 1.45s ease-in-out infinite reverse; transform-origin: center; }
    .prop-c { animation: bob 1.35s ease-in-out infinite; transform-origin: center; }
    .note { animation: floatUp 2s ease-in-out infinite; opacity: 0; }
    .note.n2 { animation-delay: .45s; }
    .note.n3 { animation-delay: .9s; }
    .letter { animation: letterFly 2.5s ease-in-out infinite; }
    .moon { animation: moonGlow 2s ease-in-out infinite; }
    .wrong-mode .stage-shell { background: linear-gradient(180deg, #c7d0ff 0 44%, #acd590 44% 100%); }
    .wrong-mode .hood { animation: surprised 1s ease-in-out infinite; }

    .paper-scene .ink {
      fill: none;
      stroke: #3a2a22;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: url(#roughInk);
    }

    .paper-scene .thin-ink {
      fill: none;
      stroke: rgba(58, 42, 34, .72);
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: url(#roughInk);
    }

    .paper-scene .wash { filter: url(#watercolor); }
    .paper-scene .sketch { animation: sketchWiggle 2.8s steps(2, end) infinite; transform-origin: center; }
    .paper-scene .hero-page { animation: storyWalk 1.05s ease-in-out infinite; transform-origin: 50% 100%; }
    .paper-scene .cape { animation: capeFlip 1.05s ease-in-out infinite; transform-origin: 18px 52px; }
    .paper-scene .flower-sway { animation: flowerSway 1.8s ease-in-out infinite; transform-origin: 50% 100%; }
    .paper-scene .cat-jump { animation: catJump 1.25s ease-in-out infinite; transform-origin: 50% 100%; }
    .paper-scene .stone-drop { animation: stoneDrop 1.45s ease-in-out infinite; transform-origin: center; }
    .paper-scene .water-shine { animation: waterShine 2.6s ease-in-out infinite; }
    .paper-scene .moon-song { animation: moonSong 2.4s ease-in-out infinite; transform-origin: center; }
    .paper-scene .pie-spin { animation: pieSpin 1.8s ease-in-out infinite; transform-origin: center; }
    .paper-scene .note-dance { animation: noteDance 1.9s ease-in-out infinite; opacity: 0; }
    .paper-scene .note-dance.n2 { animation-delay: .35s; }
    .paper-scene .note-dance.n3 { animation-delay: .7s; }
    .paper-scene .bird-fly { animation: birdFly 2.2s ease-in-out infinite; transform-origin: center; }
    .paper-scene .letter-pass { animation: letterPass 2.2s ease-in-out infinite; transform-origin: center; }
    .paper-scene .lantern-glow { animation: lanternGlow 1.8s ease-in-out infinite; transform-origin: center; }
    .paper-scene .wolf-sniff { animation: wolfSniff 1.5s ease-in-out infinite; transform-origin: 50% 100%; }

    .play {
      position: relative;
      z-index: 6;
      grid-column: 1;
      grid-row: 1;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      width: 100%;
      min-height: 100vh;
      margin: 0;
      background: var(--paper);
      border-right: 4px solid rgba(59,49,43,.18);
      box-shadow: 18px 0 52px rgba(37, 76, 54, .14);
    }

    .maze-pad {
      display: grid;
      place-items: center;
      min-height: 0;
      padding: 14px;
      overflow-x: auto;
    }

    .maze {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      grid-template-rows: repeat(10, minmax(0, 1fr));
      width: min(100%, calc(100vh - 166px));
      min-width: 0;
      background: var(--wall);
      border: 4px solid var(--wall);
      border-radius: 8px;
      overflow: hidden;
    }

    .cell {
      position: relative;
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 0;
      aspect-ratio: 1;
      border: 2px solid var(--wall);
      background: var(--tile);
      font-weight: 900;
      font-size: clamp(1.05rem, 3.2vw, 1.55rem);
      line-height: 1;
      user-select: none;
      overflow: hidden;
    }

    .cell::before {
      content: "";
      position: absolute;
      inset: 13%;
      border-radius: 6px;
      background: rgba(255,255,255,.36);
      transform: rotate(-5deg);
    }

    .cell span {
      position: relative;
      z-index: 1;
    }

    .cell.visited { background: var(--seen); }
    .cell.current {
      background: var(--now);
      animation: cellPop .24s ease-out;
    }

    .cell.current::after {
      content: "";
      position: absolute;
      z-index: 2;
      left: 50%;
      bottom: 8%;
      width: 42%;
      height: 48%;
      border-radius: 50% 50% 42% 42%;
      background:
        radial-gradient(circle at 50% 34%, #ffd7b1 0 18%, transparent 19%),
        radial-gradient(circle at 39% 33%, #2b241f 0 3%, transparent 3.5%),
        radial-gradient(circle at 61% 33%, #2b241f 0 3%, transparent 3.5%),
        linear-gradient(180deg, #d83d48 0 52%, #ea5961 53% 100%);
      border: 2px solid #9e2630;
      box-shadow: 0 2px 0 rgba(59,49,43,.2), 0 0 0 4px rgba(216, 61, 72, .12);
      transform: translateX(-50%);
      animation: miniWalk .72s ease-in-out infinite;
    }

    .cell.current span {
      z-index: 3;
      transform: translateY(-32%);
      padding: 1px 4px;
      border-radius: 6px;
      background: rgba(255, 250, 239, .74);
      text-shadow: 0 1px 0 #fff;
    }

    .cell.goal { background: #ffe28b; }
    .cell.bad { background: #d6ebff; }

    .sentence-panel {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 10px 12px 12px;
      border-top: 2px solid rgba(59,49,43,.08);
    }

    .label {
      color: var(--muted);
      font-size: .82rem;
      font-weight: 900;
    }

    .sentence {
      min-height: 2.8em;
      font-size: clamp(1rem, 2.35vw, 1.45rem);
      font-weight: 900;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, 46px);
      grid-template-rows: repeat(2, 42px);
      gap: 8px;
      justify-content: end;
      margin-top: 8px;
    }

    button {
      border: 2px solid rgba(59,49,43,.22);
      border-radius: 8px;
      background: #fffdf7;
      color: var(--ink);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 3px 0 rgba(59,49,43,.18);
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 rgba(59,49,43,.18);
    }

    .restart {
      width: 100%;
      padding: 7px 12px;
    }

    .up { grid-column: 2; }
    .left { grid-column: 1; grid-row: 2; }
    .down { grid-column: 2; grid-row: 2; }
    .right { grid-column: 3; grid-row: 2; }

    @keyframes drift {
      from { transform: translateX(-130px); }
      to { transform: translateX(1120px); }
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-1deg); }
      50% { transform: rotate(2deg); }
    }

    @keyframes heroWalk {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-8px) rotate(2deg); }
    }

    @keyframes peek {
      0%, 100% { transform: translateY(0) scaleX(1); }
      50% { transform: translateY(-12px) scaleX(.96); }
    }

    @keyframes flutter {
      0%, 100% { transform: translate(0, 0) rotate(-8deg); }
      50% { transform: translate(18px, -18px) rotate(12deg); }
    }

    @keyframes popDance {
      0%, 100% { transform: translateY(0) rotate(-4deg) scale(1); }
      50% { transform: translateY(-16px) rotate(5deg) scale(1.08); }
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
    }

    @keyframes floatUp {
      0% { transform: translateY(18px); opacity: 0; }
      35%, 70% { opacity: 1; }
      100% { transform: translateY(-54px); opacity: 0; }
    }

    @keyframes letterFly {
      0%, 100% { transform: translate(0, 0) rotate(-8deg); }
      50% { transform: translate(120px, -44px) rotate(9deg); }
    }

    @keyframes moonGlow {
      0%, 100% { opacity: .75; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.08); }
    }

    @keyframes surprised {
      0%, 100% { transform: translateY(0) rotate(-7deg); }
      50% { transform: translateY(-10px) rotate(7deg); }
    }

    @keyframes sketchWiggle {
      0%, 100% { transform: translate(0, 0) rotate(0); }
      50% { transform: translate(.8px, -.7px) rotate(.25deg); }
    }

    @keyframes storyWalk {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-7px) rotate(1.5deg); }
    }

    @keyframes capeFlip {
      0%, 100% { transform: skewX(0deg); }
      50% { transform: skewX(-9deg) translateX(-4px); }
    }

    @keyframes flowerSway {
      0%, 100% { transform: rotate(-2deg); }
      50% { transform: rotate(4deg) translateY(-5px); }
    }

    @keyframes catJump {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      45% { transform: translateY(-28px) rotate(5deg); }
      70% { transform: translateY(4px) rotate(-3deg); }
    }

    @keyframes stoneDrop {
      0%, 100% { transform: translateY(0); }
      45% { transform: translateY(-22px); }
      70% { transform: translateY(2px); }
    }

    @keyframes waterShine {
      0%, 100% { transform: translateX(-38px); opacity: .35; }
      50% { transform: translateX(42px); opacity: .82; }
    }

    @keyframes moonSong {
      0%, 100% { transform: scale(1); opacity: .78; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    @keyframes pieSpin {
      0%, 100% { transform: rotate(-3deg) scale(1); }
      50% { transform: rotate(4deg) scale(1.08); }
    }

    @keyframes noteDance {
      0% { transform: translateY(18px) rotate(-8deg); opacity: 0; }
      30%, 72% { opacity: 1; }
      100% { transform: translateY(-58px) rotate(10deg); opacity: 0; }
    }

    @keyframes birdFly {
      0%, 100% { transform: translate(0, 0) rotate(-4deg); }
      50% { transform: translate(42px, -24px) rotate(7deg); }
    }

    @keyframes letterPass {
      0% { transform: translate(-70px, 42px) rotate(-12deg); opacity: 0; }
      25%, 74% { opacity: 1; }
      100% { transform: translate(94px, -18px) rotate(8deg); opacity: 0; }
    }

    @keyframes lanternGlow {
      0%, 100% { transform: scale(1); opacity: .72; }
      50% { transform: scale(1.18); opacity: 1; }
    }

    @keyframes wolfSniff {
      0%, 100% { transform: translateY(0) rotate(0); }
      50% { transform: translateY(8px) rotate(-3deg); }
    }

    @keyframes cellPop {
      0% { transform: scale(.92); }
      70% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    @keyframes miniWalk {
      0%, 100% { transform: translateX(-50%) translateY(0) rotate(-2deg); }
      50% { transform: translateX(-50%) translateY(-5%) rotate(2deg); }
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(330px, 44vh) auto;
      }

      .stage-shell {
        grid-column: 1;
        min-height: 0;
      }

      .play {
        grid-column: 1;
        grid-row: 2;
        min-height: 0;
        border-right: 0;
        border-top: 4px solid rgba(59,49,43,.2);
        box-shadow: 0 -18px 52px rgba(37, 76, 54, .16);
      }

      .maze {
        width: 100%;
        min-width: 540px;
      }
    }

    @media (max-width: 740px) {
      .app { grid-template-rows: minmax(330px, 44vh) auto; }
      .topbar { inset: 10px 12px auto; }
      .badge { min-width: 82px; padding: 7px 9px; font-size: .9rem; }
      .stage-caption { bottom: 8px; }
      .sentence-panel { grid-template-columns: 1fr; }
      .controls { justify-content: center; }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <section class="stage-shell" aria-label="物語アニメーション">
      <div class="topbar">
        <h1>文字迷路の赤ずきん</h1>
        <div class="badge" id="badge">STAGE 1</div>
      </div>
      <svg id="stage" viewBox="0 0 1000 420" role="img" aria-label="赤ずきんのアニメーション"></svg>
      <div class="stage-caption">
        <div class="stage-title" id="stageTitle">森の入口</div>
        <div class="stage-text" id="stageText">矢印キーかボタンで進み、ひらがなをつなげて一文を完成させます。</div>
      </div>
    </section>

    <section class="play" aria-label="文字迷路">
      <div class="maze-pad">
        <div class="maze" id="maze" aria-live="polite"></div>
      </div>
      <div class="sentence-panel">
        <div>
          <div class="label">できかけの一文</div>
          <div class="sentence" id="sentence"></div>
        </div>
        <div>
          <button class="restart" id="restart">はじめから</button>
          <div class="controls" aria-label="移動">
            <button class="up" data-move="0,-1" aria-label="上へ">↑</button>
            <button class="left" data-move="-1,0" aria-label="左へ">←</button>
            <button class="down" data-move="0,1" aria-label="下へ">↓</button>
            <button class="right" data-move="1,0" aria-label="右へ">→</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const cols = 10;
    const rows = 10;
    const start = key(0, 5);

    const trunk = Array.from({ length: 10 }, (_, x) => key(x, 5));
    const routeA = [[1,4],[0,4],[0,3],[1,3],[1,2],[0,2],[0,1],[1,1],[1,0],[0,0]].map(toKey);
    const routeB = [[2,4],[3,4],[4,4],[4,3],[3,3],[2,3],[2,2],[3,2],[4,2],[4,1],[4,0],[3,0],[2,0],[2,1],[3,1]].map(toKey);
    const routeC = [[5,4],[6,4],[6,3],[5,3],[5,2],[6,2],[6,1],[5,1],[5,0],[6,0]].map(toKey);
    const routeD = [[9,4],[8,4],[7,4],[7,3],[8,3],[9,3],[9,2],[8,2],[7,2],[7,1],[7,0],[8,0],[9,0],[9,1],[8,1]].map(toKey);
    const routeE = [[0,6],[1,6],[2,6],[2,7],[1,7],[0,7],[0,8],[0,9],[1,9],[2,9],[2,8],[1,8]].map(toKey);
    const routeF = [[3,6],[4,6],[4,7],[3,7],[3,8],[4,8],[4,9],[3,9]].map(toKey);
    const routeG = [[7,6],[6,6],[5,6],[5,7],[6,7],[7,7],[7,8],[7,9],[6,9],[5,9],[5,8],[6,8]].map(toKey);
    const routeH = [[9,6],[8,6],[8,7],[9,7],[9,8],[8,8],[8,9],[9,9]].map(toKey);

    const labels = new Map();
    writeText(trunk, "あかずきんはきょうも");
    writeText([...trunk.slice(0, 2), ...routeA], "あかいはながみちでさいた");
    writeText([...trunk.slice(0, 3), ...routeB], "あかずきんはひろばでこねことあそんだ");
    writeText([...trunk.slice(0, 6), ...routeC], "あかずきんはこいしをならべてみた");
    writeText([...trunk, ...routeD], "あかずきんはきょうもみずうみでつきのうたをきいたよ");
    writeText([trunk[0], ...routeE], "あまいぱいをみんなでたべた");
    writeText([...trunk.slice(0, 4), ...routeF], "あかずきんがうたをうたう");
    writeText([...trunk.slice(0, 8), ...routeG], "あかずきんはきょうはとりにてがみをわたす");
    writeText([...trunk, ...routeH], "あかずきんはきょうもおばあさんへいく");

    const graph = new Map();
    for (let y = 0; y < rows; y += 1) {
      for (let x = 0; x < cols; x += 1) graph.set(key(x, y), new Set());
    }
    connect(trunk);
    connect([key(1, 5), ...routeA]);
    connect([key(2, 5), ...routeB]);
    connect([key(5, 5), ...routeC]);
    connect([key(9, 5), ...routeD]);
    connect([key(0, 5), ...routeE]);
    connect([key(3, 5), ...routeF]);
    connect([key(7, 5), ...routeG]);
    connect([key(9, 5), ...routeH]);

    const endings = new Map([
      [last(routeA), { type: "flower", good: false, title: "あかい花の道", text: "赤い花が道に咲き、赤ずきんは見とれて足を止めました。" }],
      [last(routeB), { type: "cat", good: false, title: "こねこと広場", text: "広場のこねこが毛糸を転がし、赤ずきんはつい遊んでしまいました。" }],
      [last(routeC), { type: "stone", good: false, title: "こいしのならべっこ", text: "赤ずきんは小石を星の形に並べて、すっかり道草をしました。" }],
      [last(routeD), { type: "lake", good: false, title: "湖と月の歌", text: "湖に映る月が歌いだし、赤ずきんは夜まで聞き入ってしまいました。" }],
      [last(routeE), { type: "pie", good: false, title: "甘いパイの会", text: "甘いパイの香りに誘われ、森のみんなでおやつ会が始まりました。" }],
      [last(routeF), { type: "song", good: false, title: "歌う赤ずきん", text: "赤ずきんは小さな舞台で歌い、森の木々が手拍子しました。" }],
      [last(routeG), { type: "bird", good: false, title: "鳥への手紙", text: "赤ずきんは鳥に手紙を渡し、空の郵便屋さんを見送りました。" }],
      [last(routeH), { type: "home", good: true, title: "おばあさんの家へ", text: "赤ずきんは今日もおばあさんの家へ、まっすぐ歩いていきました。" }]
    ]);

    const app = document.querySelector("#app");
    const stage = document.querySelector("#stage");
    const maze = document.querySelector("#maze");
    const sentence = document.querySelector("#sentence");
    const badge = document.querySelector("#badge");
    const stageTitle = document.querySelector("#stageTitle");
    const stageText = document.querySelector("#stageText");
    const cells = new Map();
    let current = start;
    let path = [start];
    let locked = false;

    validateMaze();
    buildMaze();
    renderScene("ready");
    renderMaze();

    document.querySelectorAll("[data-move]").forEach((button) => {
      button.addEventListener("click", () => {
        const [dx, dy] = button.dataset.move.split(",").map(Number);
        move(dx, dy);
      });
    });
    document.querySelector("#restart").addEventListener("click", reset);
    window.addEventListener("keydown", (event) => {
      const moves = {
        ArrowUp: [0, -1], w: [0, -1],
        ArrowDown: [0, 1], s: [0, 1],
        ArrowLeft: [-1, 0], a: [-1, 0],
        ArrowRight: [1, 0], d: [1, 0]
      };
      if (!moves[event.key]) return;
      event.preventDefault();
      move(...moves[event.key]);
    });

    function buildMaze() {
      maze.innerHTML = "";
      for (let y = 0; y < rows; y += 1) {
        for (let x = 0; x < cols; x += 1) {
          const id = key(x, y);
          const cell = document.createElement("div");
          cell.className = "cell";
          cell.innerHTML = `<span>${labels.get(id)}</span>`;
          setWalls(cell, x, y);
          if (endings.has(id)) cell.classList.add(endings.get(id).good ? "goal" : "bad");
          maze.append(cell);
          cells.set(id, cell);
        }
      }
    }

    function setWalls(cell, x, y) {
      const open = graph.get(key(x, y));
      cell.style.borderTopWidth = open.has(key(x, y - 1)) ? "0" : "2px";
      cell.style.borderRightWidth = open.has(key(x + 1, y)) ? "0" : "2px";
      cell.style.borderBottomWidth = open.has(key(x, y + 1)) ? "0" : "2px";
      cell.style.borderLeftWidth = open.has(key(x - 1, y)) ? "0" : "2px";
    }

    function move(dx, dy) {
      if (locked) return;
      const [x, y] = current.split(",").map(Number);
      const next = key(x + dx, y + dy);
      if (!graph.get(current).has(next)) {
        cells.get(current).animate([
          { transform: "translateX(0)" },
          { transform: "translateX(-5px)" },
          { transform: "translateX(5px)" },
          { transform: "translateX(0)" }
        ], { duration: 170, easing: "ease-out" });
        return;
      }
      current = next;
      const old = path.indexOf(next);
      path = old >= 0 ? path.slice(0, old + 1) : [...path, next];
      renderMaze();
      if (endings.has(current)) finish(endings.get(current));
    }

    function renderMaze() {
      for (const [id, cell] of cells) {
        cell.classList.toggle("visited", path.includes(id));
        cell.classList.toggle("current", id === current);
      }
      sentence.textContent = path.map((id) => labels.get(id)).join("");
    }

    function finish(ending) {
      locked = true;
      app.classList.toggle("wrong-mode", !ending.good);
      badge.textContent = ending.good ? "CLEAR" : "やりなおし";
      stageTitle.textContent = ending.title;
      stageText.textContent = ending.text;
      renderScene(ending.type);
      if (!ending.good) window.setTimeout(reset, 5200);
    }

    function reset() {
      current = start;
      path = [start];
      locked = false;
      app.classList.remove("wrong-mode");
      badge.textContent = "STAGE 1";
      stageTitle.textContent = "森の入口";
      stageText.textContent = "矢印キーかボタンで進み、ひらがなをつなげて一文を完成させます。";
      renderScene("ready");
      renderMaze();
    }

    function sceneProps(type) {
      const props = {
        ready: `<g>${storyHouse(false)}${storyWolf(650, 282)}${storyHero(438, 258)}<g class="bird-fly" transform="translate(246 166)">${butterfly()}</g></g>`,
        flower: `<g>${storyHero(478, 254, "surprise")}${storyWolf(654, 288)}<g transform="translate(260 286)">${storybookFlower(0, 18, 1.25)}${storybookFlower(74, -4, 1.05)}${storybookFlower(142, 22, 1.18)}<path class="thin-ink" d="M-26 84 C44 62 122 72 202 50"></path></g></g>`,
        cat: `<g>${storyHero(438, 258)}<g class="cat-jump sketch" transform="translate(652 286)"><ellipse cx="0" cy="82" rx="54" ry="10" fill="rgba(40,28,22,.2)"></ellipse><path d="M-58 58 C-48 18 20 18 52 54 C88 58 92 92 54 98 L-40 98 C-76 92 -82 66 -58 58 Z" fill="#c7834d" class="wash"></path><path d="M-44 20 L-30 50 L-10 28 L4 50 L28 22 L34 60" class="ink"></path><circle cx="-18" cy="56" r="4" fill="#2b241f"></circle><circle cx="12" cy="56" r="4" fill="#2b241f"></circle><path d="M48 70 C92 54 104 86 126 66" class="ink"></path></g><circle class="pie-spin" cx="742" cy="332" r="21" fill="#d96b8d"></circle></g>`,
        stone: `<g>${storyHero(390, 256)}<g transform="translate(612 318)"><circle class="stone-drop sketch" cx="-76" cy="0" r="17" fill="#777b78"></circle><circle class="stone-drop sketch" cx="-36" cy="-31" r="16" fill="#9b9a91" style="animation-delay:.2s"></circle><circle class="stone-drop sketch" cx="8" cy="-5" r="18" fill="#727872" style="animation-delay:.4s"></circle><circle class="stone-drop sketch" cx="52" cy="-36" r="15" fill="#a5a39a" style="animation-delay:.6s"></circle><circle class="stone-drop sketch" cx="92" cy="0" r="18" fill="#858982" style="animation-delay:.8s"></circle><path d="M-100 24 C-42 5 36 4 116 20" class="thin-ink"></path></g></g>`,
        lake: `<g>${storyHero(356, 260, "surprise")}<g transform="translate(618 256)" class="sketch"><ellipse cx="0" cy="82" rx="188" ry="58" fill="#6fa6b8" class="wash"></ellipse><path d="M-172 82 C-98 54 76 54 172 82 C94 116 -84 120 -172 82 Z" class="ink"></path><path class="water-shine thin-ink" d="M-110 76 C-60 60 -12 96 42 74 M8 102 C54 88 96 104 138 88"></path><circle class="moon-song" cx="-54" cy="-64" r="40" fill="#f5df72"></circle><ellipse class="moon-song" cx="-54" cy="70" rx="36" ry="13" fill="#f5df72" opacity=".72"></ellipse><text class="note-dance" x="44" y="8" font-size="42" fill="#6d4d88">♪</text><text class="note-dance n2" x="96" y="38" font-size="34" fill="#6d4d88">♪</text><text class="note-dance n3" x="132" y="-12" font-size="38" fill="#6d4d88">♪</text></g></g>`,
        pie: `<g>${storyHero(382, 258)}<g transform="translate(628 304)" class="sketch"><ellipse cx="0" cy="78" rx="174" ry="25" fill="#6f9859" class="wash"></ellipse><g class="pie-spin"><circle cx="-58" cy="6" r="42" fill="#c98545" class="wash"></circle><path d="M-100 6 H-16 M-58 -36 V48 M-88 -24 L-28 36 M-28 -24 L-88 36" class="ink"></path></g><circle class="pie-spin" cx="38" cy="18" r="28" fill="#f0cf68" style="animation-delay:.25s"></circle><circle class="pie-spin" cx="98" cy="10" r="23" fill="#cb6171" style="animation-delay:.5s"></circle></g></g>`,
        song: `<g>${storyHero(436, 252)}<g transform="translate(612 284)" class="sketch"><rect x="-116" y="74" width="232" height="32" rx="8" fill="#8a5b3b" class="wash"></rect><path d="M-116 74 H116 V106 H-116 Z" class="ink"></path><text class="note-dance" x="-92" y="14" font-size="48" fill="#bd3d48">♪</text><text class="note-dance n2" x="0" y="-8" font-size="56" fill="#2f7656">♪</text><text class="note-dance n3" x="78" y="24" font-size="42" fill="#c88730">♪</text><path class="thin-ink" d="M-48 56 C-18 42 22 42 56 58"></path></g></g>`,
        bird: `<g>${storyHero(390, 260)}<g transform="translate(575 190)"><g class="bird-fly sketch"><path d="M0 0 C-64 -34 -92 28 -24 42 Z" fill="#5d94aa" class="wash"></path><path d="M0 0 C58 -34 96 24 28 42 Z" fill="#80adbd" class="wash"></path><circle cx="12" cy="-4" r="24" fill="#77a8b8" class="wash"></circle><path d="M34 -8 L60 2 L34 14 Z" fill="#d39a3e"></path><circle cx="17" cy="-10" r="4" fill="#2b241f"></circle><path d="M0 0 C-64 -34 -92 28 -24 42 M0 0 C58 -34 96 24 28 42" class="ink"></path></g><g class="letter-pass"><rect x="-142" y="74" width="66" height="42" rx="5" fill="#fff0c5"></rect><path d="M-142 74 H-76 V116 H-142 Z M-142 74 L-109 101 L-76 74" class="ink"></path></g></g></g>`,
        home: `<g>${storyHouse(true)}${storyHero(552, 262)}<path class="thin-ink" d="M438 378 C520 344 630 348 736 330"></path><g transform="translate(676 284)" class="sketch"><path class="pie-spin" d="M0 0 C40 -38 92 -34 130 0 C94 42 40 42 0 0 Z" fill="#f3df86"></path><path d="M0 0 C40 -38 92 -34 130 0 C94 42 40 42 0 0 Z" class="ink"></path><text x="34" y="14" font-size="29" font-weight="900" fill="#70472e">ついた</text></g></g>`
      };
      return props[type] || props.ready;
    }

    function butterfly() {
      return `<path d="M0 0 C-28 -25 -52 5 -15 20 Z" fill="#c96b68" class="wash"></path><path d="M0 0 C28 -25 52 5 15 20 Z" fill="#e0b653" class="wash"></path><circle cx="0" cy="6" r="5" fill="#3a2a22"></circle><path d="M0 2 C-28 -25 -52 5 -15 20 M0 2 C28 -25 52 5 15 20" class="thin-ink"></path>`;
    }

    function connect(ids) {
      for (let i = 0; i < ids.length - 1; i += 1) {
        graph.get(ids[i]).add(ids[i + 1]);
        graph.get(ids[i + 1]).add(ids[i]);
      }
    }

    function writeText(ids, text) {
      const chars = [...text];
      if (ids.length !== chars.length) throw new Error(`${text} の文字数がルート長と違います`);
      chars.forEach((char, index) => labels.set(ids[index], char));
    }

    function validateMaze() {
      const all = new Set([...trunk, ...routeA, ...routeB, ...routeC, ...routeD, ...routeE, ...routeF, ...routeG, ...routeH]);
      if (all.size !== 100 || labels.size !== 100) throw new Error("迷路が100マスで構成されていません");
      const seen = new Set([start]);
      const queue = [start];
      while (queue.length) {
        const id = queue.shift();
        for (const next of graph.get(id)) {
          if (seen.has(next)) continue;
          seen.add(next);
          queue.push(next);
        }
      }
      if (seen.size !== 100) throw new Error("到達できないマスがあります");
      const badCount = [...endings.values()].filter((ending) => !ending.good).length;
      if (badCount < 7) throw new Error("不正解ルートが7本未満です");
    }

    function key(x, y) {
      return `${x},${y}`;
    }

    function toKey([x, y]) {
      return key(x, y);
    }

    function last(items) {
      return items[items.length - 1];
    }
  </script>
