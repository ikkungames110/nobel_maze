<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>文字迷路の赤ずきん 10x10</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #2b241f;
      --muted: #6d6258;
      --cream: #fff7e8;
      --paper: rgba(255, 249, 237, .92);
      --wall: #3b312b;
      --tile: #fff0d3;
      --seen: #ffd3c8;
      --now: #ef9b96;
      --red: #d83d48;
      --green: #3d7d58;
      --blue: #86c7e8;
      --gold: #f1b83f;
      font-family: "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", Meiryo, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: linear-gradient(180deg, #bfe9ff 0 44%, #a9d78e 44% 100%);
      overflow-x: hidden;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(520px, 1.04fr) minmax(360px, .96fr);
      grid-template-rows: minmax(0, 1fr);
    }

    .stage-shell {
      position: relative;
      grid-column: 2;
      overflow: hidden;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 14%, rgba(255, 217, 92, .88) 0 38px, transparent 39px),
        linear-gradient(180deg, rgba(255,255,255,.24), rgba(255,255,255,0) 38%);
    }

    .topbar {
      position: absolute;
      z-index: 5;
      inset: 16px 18px auto;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 3.2vw, 2.35rem);
      line-height: 1.08;
      letter-spacing: 0;
      text-shadow: 0 2px 0 rgba(255,255,255,.62);
    }

    .badge {
      min-width: 98px;
      padding: 8px 12px;
      border: 2px solid rgba(59,49,43,.2);
      border-radius: 8px;
      background: rgba(255, 250, 239, .88);
      text-align: center;
      font-weight: 900;
      white-space: nowrap;
    }

    .stage-caption {
      position: absolute;
      z-index: 5;
      left: 50%;
      bottom: 12px;
      width: min(680px, calc(100% - 24px));
      transform: translateX(-50%);
      display: grid;
      gap: 4px;
      padding: 10px 12px;
      border: 2px solid rgba(59,49,43,.16);
      border-radius: 8px;
      background: rgba(255, 250, 239, .82);
      backdrop-filter: blur(8px);
    }

    .stage-title {
      font-size: clamp(1.05rem, 2.2vw, 1.55rem);
      font-weight: 900;
    }

    .stage-text {
      color: var(--muted);
      font-size: clamp(.88rem, 1.8vw, 1rem);
      line-height: 1.45;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .cloud { animation: drift 18s linear infinite; }
    .cloud.c2 { animation-duration: 23s; animation-delay: -7s; }
    .tree-top { animation: sway 3.5s ease-in-out infinite; transform-origin: center bottom; }
    .hood { animation: heroWalk 1.1s ease-in-out infinite; transform-origin: 50% 100%; }
    .wolf { animation: peek 1.8s ease-in-out infinite; transform-origin: 50% 100%; }
    .butterfly { animation: flutter 2.2s ease-in-out infinite; }
    .prop-a { animation: popDance 1.25s ease-in-out infinite; transform-origin: center; }
    .prop-b { animation: popDance 1.45s ease-in-out infinite reverse; transform-origin: center; }
    .prop-c { animation: bob 1.35s ease-in-out infinite; transform-origin: center; }
    .note { animation: floatUp 2s ease-in-out infinite; opacity: 0; }
    .note.n2 { animation-delay: .45s; }
    .note.n3 { animation-delay: .9s; }
    .letter { animation: letterFly 2.5s ease-in-out infinite; }
    .moon { animation: moonGlow 2s ease-in-out infinite; }
    .wrong-mode .stage-shell { background: linear-gradient(180deg, #c7d0ff 0 44%, #acd590 44% 100%); }
    .wrong-mode .hood { animation: surprised 1s ease-in-out infinite; }

    .play {
      position: relative;
      z-index: 6;
      grid-column: 1;
      grid-row: 1;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      width: 100%;
      min-height: 100vh;
      margin: 0;
      background: var(--paper);
      border-right: 4px solid rgba(59,49,43,.18);
      box-shadow: 18px 0 52px rgba(37, 76, 54, .14);
    }

    .maze-pad {
      display: grid;
      place-items: center;
      min-height: 0;
      padding: 14px;
      overflow-x: auto;
    }

    .maze {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      grid-template-rows: repeat(10, minmax(0, 1fr));
      width: min(100%, calc(100vh - 166px));
      min-width: 0;
      background: var(--wall);
      border: 4px solid var(--wall);
      border-radius: 8px;
      overflow: hidden;
    }

    .cell {
      position: relative;
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 0;
      aspect-ratio: 1;
      border: 2px solid var(--wall);
      background: var(--tile);
      font-weight: 900;
      font-size: clamp(1.05rem, 3.2vw, 1.55rem);
      line-height: 1;
      user-select: none;
      overflow: hidden;
    }

    .cell::before {
      content: "";
      position: absolute;
      inset: 13%;
      border-radius: 6px;
      background: rgba(255,255,255,.36);
      transform: rotate(-5deg);
    }

    .cell span {
      position: relative;
      z-index: 1;
    }

    .cell.visited { background: var(--seen); }
    .cell.current {
      background: var(--now);
      animation: cellPop .24s ease-out;
    }

    .cell.current::after {
      content: "";
      position: absolute;
      z-index: 2;
      left: 50%;
      bottom: 8%;
      width: 42%;
      height: 48%;
      border-radius: 50% 50% 42% 42%;
      background:
        radial-gradient(circle at 50% 34%, #ffd7b1 0 18%, transparent 19%),
        radial-gradient(circle at 39% 33%, #2b241f 0 3%, transparent 3.5%),
        radial-gradient(circle at 61% 33%, #2b241f 0 3%, transparent 3.5%),
        linear-gradient(180deg, #d83d48 0 52%, #ea5961 53% 100%);
      border: 2px solid #9e2630;
      box-shadow: 0 2px 0 rgba(59,49,43,.2), 0 0 0 4px rgba(216, 61, 72, .12);
      transform: translateX(-50%);
      animation: miniWalk .72s ease-in-out infinite;
    }

    .cell.current span {
      z-index: 3;
      transform: translateY(-32%);
      padding: 1px 4px;
      border-radius: 6px;
      background: rgba(255, 250, 239, .74);
      text-shadow: 0 1px 0 #fff;
    }

    .cell.goal { background: #ffe28b; }
    .cell.bad { background: #d6ebff; }

    .sentence-panel {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 10px 12px 12px;
      border-top: 2px solid rgba(59,49,43,.08);
    }

    .label {
      color: var(--muted);
      font-size: .82rem;
      font-weight: 900;
    }

    .sentence {
      min-height: 2.8em;
      font-size: clamp(1rem, 2.35vw, 1.45rem);
      font-weight: 900;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, 46px);
      grid-template-rows: repeat(2, 42px);
      gap: 8px;
      justify-content: end;
      margin-top: 8px;
    }

    button {
      border: 2px solid rgba(59,49,43,.22);
      border-radius: 8px;
      background: #fffdf7;
      color: var(--ink);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 3px 0 rgba(59,49,43,.18);
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 rgba(59,49,43,.18);
    }

    .restart {
      width: 100%;
      padding: 7px 12px;
    }

    .up { grid-column: 2; }
    .left { grid-column: 1; grid-row: 2; }
    .down { grid-column: 2; grid-row: 2; }
    .right { grid-column: 3; grid-row: 2; }

    @keyframes drift {
      from { transform: translateX(-130px); }
      to { transform: translateX(1120px); }
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-1deg); }
      50% { transform: rotate(2deg); }
    }

    @keyframes heroWalk {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-8px) rotate(2deg); }
    }

    @keyframes peek {
      0%, 100% { transform: translateY(0) scaleX(1); }
      50% { transform: translateY(-12px) scaleX(.96); }
    }

    @keyframes flutter {
      0%, 100% { transform: translate(0, 0) rotate(-8deg); }
      50% { transform: translate(18px, -18px) rotate(12deg); }
    }

    @keyframes popDance {
      0%, 100% { transform: translateY(0) rotate(-4deg) scale(1); }
      50% { transform: translateY(-16px) rotate(5deg) scale(1.08); }
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
    }

    @keyframes floatUp {
      0% { transform: translateY(18px); opacity: 0; }
      35%, 70% { opacity: 1; }
      100% { transform: translateY(-54px); opacity: 0; }
    }

    @keyframes letterFly {
      0%, 100% { transform: translate(0, 0) rotate(-8deg); }
      50% { transform: translate(120px, -44px) rotate(9deg); }
    }

    @keyframes moonGlow {
      0%, 100% { opacity: .75; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.08); }
    }

    @keyframes surprised {
      0%, 100% { transform: translateY(0) rotate(-7deg); }
      50% { transform: translateY(-10px) rotate(7deg); }
    }

    @keyframes cellPop {
      0% { transform: scale(.92); }
      70% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    @keyframes miniWalk {
      0%, 100% { transform: translateX(-50%) translateY(0) rotate(-2deg); }
      50% { transform: translateX(-50%) translateY(-5%) rotate(2deg); }
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(330px, 44vh) auto;
      }

      .stage-shell {
        grid-column: 1;
        min-height: 0;
      }

      .play {
        grid-column: 1;
        grid-row: 2;
        min-height: 0;
        border-right: 0;
        border-top: 4px solid rgba(59,49,43,.2);
        box-shadow: 0 -18px 52px rgba(37, 76, 54, .16);
      }

      .maze {
        width: 100%;
        min-width: 540px;
      }
    }

    @media (max-width: 740px) {
      .app { grid-template-rows: minmax(330px, 44vh) auto; }
      .topbar { inset: 10px 12px auto; }
      .badge { min-width: 82px; padding: 7px 9px; font-size: .9rem; }
      .stage-caption { bottom: 8px; }
      .sentence-panel { grid-template-columns: 1fr; }
      .controls { justify-content: center; }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <section class="stage-shell" aria-label="物語アニメーション">
      <div class="topbar">
        <h1>文字迷路の赤ずきん</h1>
        <div class="badge" id="badge">STAGE 1</div>
      </div>
      <svg id="stage" viewBox="0 0 1000 420" role="img" aria-label="赤ずきんのアニメーション"></svg>
      <div class="stage-caption">
        <div class="stage-title" id="stageTitle">森の入口</div>
        <div class="stage-text" id="stageText">矢印キーかボタンで進み、ひらがなをつなげて一文を完成させます。</div>
      </div>
    </section>

    <section class="play" aria-label="文字迷路">
      <div class="maze-pad">
        <div class="maze" id="maze" aria-live="polite"></div>
      </div>
      <div class="sentence-panel">
        <div>
          <div class="label">できかけの一文</div>
          <div class="sentence" id="sentence"></div>
        </div>
        <div>
          <button class="restart" id="restart">はじめから</button>
          <div class="controls" aria-label="移動">
            <button class="up" data-move="0,-1" aria-label="上へ">↑</button>
            <button class="left" data-move="-1,0" aria-label="左へ">←</button>
            <button class="down" data-move="0,1" aria-label="下へ">↓</button>
            <button class="right" data-move="1,0" aria-label="右へ">→</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const cols = 10;
    const rows = 10;
    const start = key(0, 5);

    const trunk = Array.from({ length: 10 }, (_, x) => key(x, 5));
    const routeA = [[1,4],[0,4],[0,3],[1,3],[1,2],[0,2],[0,1],[1,1],[1,0],[0,0]].map(toKey);
    const routeB = [[2,4],[3,4],[4,4],[4,3],[3,3],[2,3],[2,2],[3,2],[4,2],[4,1],[4,0],[3,0],[2,0],[2,1],[3,1]].map(toKey);
    const routeC = [[5,4],[6,4],[6,3],[5,3],[5,2],[6,2],[6,1],[5,1],[5,0],[6,0]].map(toKey);
    const routeD = [[9,4],[8,4],[7,4],[7,3],[8,3],[9,3],[9,2],[8,2],[7,2],[7,1],[7,0],[8,0],[9,0],[9,1],[8,1]].map(toKey);
    const routeE = [[0,6],[1,6],[2,6],[2,7],[1,7],[0,7],[0,8],[0,9],[1,9],[2,9],[2,8],[1,8]].map(toKey);
    const routeF = [[3,6],[4,6],[4,7],[3,7],[3,8],[4,8],[4,9],[3,9]].map(toKey);
    const routeG = [[7,6],[6,6],[5,6],[5,7],[6,7],[7,7],[7,8],[7,9],[6,9],[5,9],[5,8],[6,8]].map(toKey);
    const routeH = [[9,6],[8,6],[8,7],[9,7],[9,8],[8,8],[8,9],[9,9]].map(toKey);

    const labels = new Map();
    writeText(trunk, "あかずきんはきょうも");
    writeText([...trunk.slice(0, 2), ...routeA], "あかいはながみちでさいた");
    writeText([...trunk.slice(0, 3), ...routeB], "あかずきんはひろばでこねことあそんだ");
    writeText([...trunk.slice(0, 6), ...routeC], "あかずきんはこいしをならべてみた");
    writeText([...trunk, ...routeD], "あかずきんはきょうもみずうみでつきのうたをきいたよ");
    writeText([trunk[0], ...routeE], "あまいぱいをみんなでたべた");
    writeText([...trunk.slice(0, 4), ...routeF], "あかずきんがうたをうたう");
    writeText([...trunk.slice(0, 8), ...routeG], "あかずきんはきょうはとりにてがみをわたす");
    writeText([...trunk, ...routeH], "あかずきんはきょうもおばあさんへいく");

    const graph = new Map();
    for (let y = 0; y < rows; y += 1) {
      for (let x = 0; x < cols; x += 1) graph.set(key(x, y), new Set());
    }
    connect(trunk);
    connect([key(1, 5), ...routeA]);
    connect([key(2, 5), ...routeB]);
    connect([key(5, 5), ...routeC]);
    connect([key(9, 5), ...routeD]);
    connect([key(0, 5), ...routeE]);
    connect([key(3, 5), ...routeF]);
    connect([key(7, 5), ...routeG]);
    connect([key(9, 5), ...routeH]);

    const endings = new Map([
      [last(routeA), { type: "flower", good: false, title: "あかい花の道", text: "赤い花が道に咲き、赤ずきんは見とれて足を止めました。" }],
      [last(routeB), { type: "cat", good: false, title: "こねこと広場", text: "広場のこねこが毛糸を転がし、赤ずきんはつい遊んでしまいました。" }],
      [last(routeC), { type: "stone", good: false, title: "こいしのならべっこ", text: "赤ずきんは小石を星の形に並べて、すっかり道草をしました。" }],
      [last(routeD), { type: "lake", good: false, title: "湖と月の歌", text: "湖に映る月が歌いだし、赤ずきんは夜まで聞き入ってしまいました。" }],
      [last(routeE), { type: "pie", good: false, title: "甘いパイの会", text: "甘いパイの香りに誘われ、森のみんなでおやつ会が始まりました。" }],
      [last(routeF), { type: "song", good: false, title: "歌う赤ずきん", text: "赤ずきんは小さな舞台で歌い、森の木々が手拍子しました。" }],
      [last(routeG), { type: "bird", good: false, title: "鳥への手紙", text: "赤ずきんは鳥に手紙を渡し、空の郵便屋さんを見送りました。" }],
      [last(routeH), { type: "home", good: true, title: "おばあさんの家へ", text: "赤ずきんは今日もおばあさんの家へ、まっすぐ歩いていきました。" }]
    ]);

    const app = document.querySelector("#app");
    const stage = document.querySelector("#stage");
    const maze = document.querySelector("#maze");
    const sentence = document.querySelector("#sentence");
    const badge = document.querySelector("#badge");
    const stageTitle = document.querySelector("#stageTitle");
    const stageText = document.querySelector("#stageText");
    const cells = new Map();
    let current = start;
    let path = [start];
    let locked = false;

    validateMaze();
    buildMaze();
    renderScene("ready");
    renderMaze();

    document.querySelectorAll("[data-move]").forEach((button) => {
      button.addEventListener("click", () => {
        const [dx, dy] = button.dataset.move.split(",").map(Number);
        move(dx, dy);
      });
    });
    document.querySelector("#restart").addEventListener("click", reset);
    window.addEventListener("keydown", (event) => {
      const moves = {
        ArrowUp: [0, -1], w: [0, -1],
        ArrowDown: [0, 1], s: [0, 1],
        ArrowLeft: [-1, 0], a: [-1, 0],
        ArrowRight: [1, 0], d: [1, 0]
      };
      if (!moves[event.key]) return;
      event.preventDefault();
      move(...moves[event.key]);
    });

    function buildMaze() {
      maze.innerHTML = "";
      for (let y = 0; y < rows; y += 1) {
        for (let x = 0; x < cols; x += 1) {
          const id = key(x, y);
          const cell = document.createElement("div");
          cell.className = "cell";
          cell.innerHTML = `<span>${labels.get(id)}</span>`;
          setWalls(cell, x, y);
          if (endings.has(id)) cell.classList.add(endings.get(id).good ? "goal" : "bad");
          maze.append(cell);
          cells.set(id, cell);
        }
      }
    }

    function setWalls(cell, x, y) {
      const open = graph.get(key(x, y));
      cell.style.borderTopWidth = open.has(key(x, y - 1)) ? "0" : "2px";
      cell.style.borderRightWidth = open.has(key(x + 1, y)) ? "0" : "2px";
      cell.style.borderBottomWidth = open.has(key(x, y + 1)) ? "0" : "2px";
      cell.style.borderLeftWidth = open.has(key(x - 1, y)) ? "0" : "2px";
    }

    function move(dx, dy) {
      if (locked) return;
      const [x, y] = current.split(",").map(Number);
      const next = key(x + dx, y + dy);
      if (!graph.get(current).has(next)) {
        cells.get(current).animate([
          { transform: "translateX(0)" },
          { transform: "translateX(-5px)" },
          { transform: "translateX(5px)" },
          { transform: "translateX(0)" }
        ], { duration: 170, easing: "ease-out" });
        return;
      }
      current = next;
      const old = path.indexOf(next);
      path = old >= 0 ? path.slice(0, old + 1) : [...path, next];
      renderMaze();
      if (endings.has(current)) finish(endings.get(current));
    }

    function renderMaze() {
      for (const [id, cell] of cells) {
        cell.classList.toggle("visited", path.includes(id));
        cell.classList.toggle("current", id === current);
      }
      sentence.textContent = path.map((id) => labels.get(id)).join("");
    }

    function finish(ending) {
      locked = true;
      app.classList.toggle("wrong-mode", !ending.good);
      badge.textContent = ending.good ? "CLEAR" : "やりなおし";
      stageTitle.textContent = ending.title;
      stageText.textContent = ending.text;
      renderScene(ending.type);
      if (!ending.good) window.setTimeout(reset, 5200);
    }

    function reset() {
      current = start;
      path = [start];
      locked = false;
      app.classList.remove("wrong-mode");
      badge.textContent = "STAGE 1";
      stageTitle.textContent = "森の入口";
      stageText.textContent = "矢印キーかボタンで進み、ひらがなをつなげて一文を完成させます。";
      renderScene("ready");
      renderMaze();
    }

    function renderScene(type) {
      stage.innerHTML = `
        <rect width="1000" height="420" fill="#bfe9ff"></rect>
        <g class="cloud c1"><ellipse cx="90" cy="74" rx="42" ry="18" fill="#fff"/><ellipse cx="124" cy="69" rx="34" ry="22" fill="#fff"/><ellipse cx="154" cy="77" rx="45" ry="17" fill="#fff"/></g>
        <g class="cloud c2"><ellipse cx="420" cy="92" rx="46" ry="17" fill="#fff"/><ellipse cx="458" cy="84" rx="32" ry="23" fill="#fff"/><ellipse cx="490" cy="94" rx="42" ry="16" fill="#fff"/></g>
        <rect y="245" width="1000" height="175" fill="#9ed27e"></rect>
        <path d="M0 286 C180 224 278 288 430 246 C620 194 782 250 1000 214 L1000 420 L0 420 Z" fill="#76b96d"></path>
        <path d="M445 420 C455 342 500 292 555 240 C604 294 642 348 653 420 Z" fill="#d5aa73"></path>
        ${forest()}
        ${house(type === "home")}
        ${hero()}
        ${wolf(type)}
        ${sceneProps(type)}
      `;
    }

    function forest() {
      return Array.from({ length: 9 }, (_, i) => {
        const x = 42 + i * 112;
        const h = 122 + (i % 3) * 22;
        return `<g transform="translate(${x} ${250 - h * .25})">
          <rect x="-9" y="${h * .55}" width="18" height="${h * .45}" fill="#7b5435"></rect>
          <path class="tree-top" d="M0 0 L-48 ${h * .72} H48 Z" fill="${i % 2 ? "#34734f" : "#3f865e"}"></path>
          <path class="tree-top" d="M0 30 L-40 ${h * .84} H40 Z" fill="${i % 2 ? "#2c6847" : "#367a55"}"></path>
        </g>`;
      }).join("");
    }

    function hero() {
      return `<g class="hood" transform="translate(430 252)">
        <ellipse cx="0" cy="88" rx="38" ry="9" fill="rgba(61,49,43,.2)"></ellipse>
        <path d="M-30 24 C-28 -20 28 -20 30 24 L22 76 H-22 Z" fill="#d83d48"></path>
        <circle cx="0" cy="22" r="20" fill="#ffd7b1"></circle>
        <path d="M-36 18 C-10 -20 18 -20 38 18 C22 9 10 3 0 3 C-12 3 -24 9 -36 18 Z" fill="#bd2938"></path>
        <path d="M-24 60 H24 L34 94 H-34 Z" fill="#ea5961"></path>
        <circle cx="-7" cy="21" r="2.8" fill="#2b241f"></circle>
        <circle cx="8" cy="21" r="2.8" fill="#2b241f"></circle>
        <path d="M-6 33 Q1 38 9 32" fill="none" stroke="#7b463c" stroke-width="3" stroke-linecap="round"></path>
        <g transform="translate(43 58)">
          <path d="M-16 -3 Q0 -24 16 -3" fill="none" stroke="#7b4c2d" stroke-width="5"></path>
          <rect x="-18" y="-4" width="36" height="26" rx="7" fill="#d99a4b" stroke="#7b4c2d" stroke-width="4"></rect>
        </g>
      </g>`;
    }

    function wolf(type) {
      if (type === "home") return "";
      return `<g class="wolf" transform="translate(690 260)">
        <ellipse cx="4" cy="82" rx="45" ry="8" fill="rgba(61,49,43,.18)"></ellipse>
        <path d="M-42 66 C-38 24 38 18 48 64 L30 92 H-26 Z" fill="#7d858d"></path>
        <path d="M-28 12 L-7 28 L10 8 L24 28 L45 12 L35 58 H-24 Z" fill="#858c94"></path>
        <circle cx="-10" cy="39" r="3.5" fill="#1f2428"></circle>
        <circle cx="18" cy="39" r="3.5" fill="#1f2428"></circle>
        <path d="M3 47 l8 7 l-15 0 z" fill="#3a3a3a"></path>
      </g>`;
    }

    function house(active) {
      return `<g transform="translate(755 208)" opacity="${active ? 1 : .62}">
        <rect x="0" y="68" width="140" height="104" rx="5" fill="#ffe1a6" stroke="#8b6540" stroke-width="5"></rect>
        <path d="M-14 76 L70 0 L154 76 Z" fill="#c6533e" stroke="#8b3f33" stroke-width="5"></path>
        <rect x="58" y="112" width="34" height="60" rx="4" fill="#8b6540"></rect>
        <rect x="18" y="92" width="34" height="30" rx="4" fill="#8bd1e8" stroke="#8b6540" stroke-width="4"></rect>
        <circle class="prop-c" cx="120" cy="50" r="${active ? 12 : 0}" fill="#ffe66c"></circle>
      </g>`;
    }

    function sceneProps(type) {
      const props = {
        ready: `<g class="butterfly" transform="translate(265 176)"><path d="M0 0 C-28 -25 -46 4 -13 17 Z" fill="#f2a6c5"/><path d="M0 0 C28 -25 46 4 13 17 Z" fill="#f8c46f"/><circle cx="0" cy="5" r="4" fill="#55413a"/></g>`,
        flower: `<g transform="translate(255 290)">${flower(0, 0)}${flower(70, -20)}${flower(132, 4)}<text class="prop-c" x="76" y="-50" font-size="36" font-weight="900" fill="#d83d48">さいた</text></g>`,
        cat: `<g transform="translate(640 286)"><ellipse class="prop-a" cx="0" cy="24" rx="48" ry="28" fill="#f0b15b"/><circle class="prop-a" cx="-32" cy="-8" r="27" fill="#f0b15b"/><path d="M-52 -34 L-42 -10 L-22 -31 Z" fill="#f0b15b"/><circle cx="-41" cy="-10" r="3" fill="#222"/><circle cx="-24" cy="-10" r="3" fill="#222"/><circle class="prop-b" cx="84" cy="31" r="24" fill="#df6aa0"/><path d="M59 31 C18 22 8 4 -9 15" fill="none" stroke="#df6aa0" stroke-width="5"/></g>`,
        stone: `<g transform="translate(580 312)"><circle class="prop-a" cx="-70" cy="0" r="14" fill="#8a8f91"/><circle class="prop-b" cx="-30" cy="-28" r="13" fill="#9ba0a2"/><circle class="prop-a" cx="16" cy="-4" r="15" fill="#777f82"/><circle class="prop-b" cx="54" cy="-32" r="12" fill="#a4a8aa"/><circle class="prop-c" cx="92" cy="0" r="14" fill="#8a8f91"/></g>`,
        lake: `<g transform="translate(600 248)"><ellipse cx="0" cy="78" rx="170" ry="52" fill="#6db6d8"/><ellipse class="moon" cx="-42" cy="52" rx="34" ry="14" fill="#fff2a0"/><circle class="moon" cx="-42" cy="-78" r="38" fill="#fff2a0"/><text class="note" x="42" y="-16" font-size="42" fill="#644fa3">♪</text><text class="note n2" x="92" y="12" font-size="34" fill="#644fa3">♪</text><text class="note n3" x="132" y="-24" font-size="38" fill="#644fa3">♪</text></g>`,
        pie: `<g transform="translate(600 292)"><ellipse cx="0" cy="74" rx="150" ry="24" fill="#7fb66d"/><circle class="prop-a" cx="-50" cy="10" r="38" fill="#d9954d"/><path d="M-88 10 H-12" stroke="#8d552d" stroke-width="5"/><path d="M-50 -28 V48" stroke="#8d552d" stroke-width="5"/><circle class="prop-b" cx="54" cy="18" r="24" fill="#ffe38c"/><circle class="prop-c" cx="104" cy="12" r="20" fill="#f6b0ba"/></g>`,
        song: `<g transform="translate(590 276)"><rect x="-95" y="58" width="190" height="28" rx="6" fill="#8b6540"/><text class="note" x="-70" y="0" font-size="44" fill="#d83d48">♪</text><text class="note n2" x="8" y="-18" font-size="50" fill="#2d6f97">♪</text><text class="note n3" x="76" y="8" font-size="38" fill="#d99a28">♪</text></g>`,
        bird: `<g transform="translate(560 208)"><g class="prop-a"><path d="M0 0 C-48 -22 -70 24 -18 30 Z" fill="#5aa4cf"/><path d="M0 0 C44 -26 72 20 20 30 Z" fill="#78c2e2"/><circle cx="9" cy="-5" r="20" fill="#6bb7dc"/><path d="M28 -7 L48 2 L28 11 Z" fill="#e6a84b"/><circle cx="14" cy="-10" r="3" fill="#222"/></g><rect class="letter" x="-150" y="74" width="62" height="38" rx="4" fill="#fff7df" stroke="#8b6540" stroke-width="4"/><path class="letter" d="M-150 74 L-119 99 L-88 74" fill="none" stroke="#8b6540" stroke-width="4"/></g>`,
        home: `<g transform="translate(700 270)"><path class="prop-a" d="M0 0 C36 -34 84 -30 118 0 C84 40 36 40 0 0 Z" fill="#fff1a8"/><text x="32" y="13" font-size="28" font-weight="900" fill="#8b6540">ついた</text></g>`
      };
      return props[type] || props.ready;
    }

    function flower(x, y) {
      return `<g class="prop-a" transform="translate(${x} ${y})">
        <line x1="0" y1="52" x2="0" y2="8" stroke="#34734f" stroke-width="6"/>
        <circle cx="0" cy="0" r="13" fill="#ffd95f"/>
        <circle cx="-18" cy="0" r="15" fill="#e6577a"/>
        <circle cx="18" cy="0" r="15" fill="#e6577a"/>
        <circle cx="0" cy="-18" r="15" fill="#e6577a"/>
        <circle cx="0" cy="18" r="15" fill="#e6577a"/>
      </g>`;
    }

    function connect(ids) {
      for (let i = 0; i < ids.length - 1; i += 1) {
        graph.get(ids[i]).add(ids[i + 1]);
        graph.get(ids[i + 1]).add(ids[i]);
      }
    }

    function writeText(ids, text) {
      const chars = [...text];
      if (ids.length !== chars.length) throw new Error(`${text} の文字数がルート長と違います`);
      chars.forEach((char, index) => labels.set(ids[index], char));
    }

    function validateMaze() {
      const all = new Set([...trunk, ...routeA, ...routeB, ...routeC, ...routeD, ...routeE, ...routeF, ...routeG, ...routeH]);
      if (all.size !== 100 || labels.size !== 100) throw new Error("迷路が100マスで構成されていません");
      const seen = new Set([start]);
      const queue = [start];
      while (queue.length) {
        const id = queue.shift();
        for (const next of graph.get(id)) {
          if (seen.has(next)) continue;
          seen.add(next);
          queue.push(next);
        }
      }
      if (seen.size !== 100) throw new Error("到達できないマスがあります");
      const badCount = [...endings.values()].filter((ending) => !ending.good).length;
      if (badCount < 7) throw new Error("不正解ルートが7本未満です");
    }

    function key(x, y) {
      return `${x},${y}`;
    }

    function toKey([x, y]) {
      return key(x, y);
    }

    function last(items) {
      return items[items.length - 1];
    }
  </script>
</body>
